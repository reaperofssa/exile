<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EXILE — Group</title>
<style>
:root {
  --dusk-deep:     #120812;
  --dusk-mid:      #1e0e24;
  --amber:         #c97b3a;
  --amber-light:   #e8a85c;
  --purple-accent: #9b59b6;
  --purple-glow:   rgba(155,89,182,0.3);
  --text-primary:  rgba(255,255,255,0.93);
  --text-sec:      rgba(255,255,255,0.55);
  --text-dim:      rgba(255,255,255,0.3);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --bubble-me:     #4a1a6e;
  --bubble-them:   #1e1428;
  --bubble-me-brd: rgba(155,89,182,0.4);
  --bubble-them-brd: rgba(255,255,255,0.08);
  --error:   rgba(239,68,68,0.9);
  --success: rgba(16,185,129,0.9);
}
body.dark-mode {
  --dusk-deep:     #000000;
  --dusk-mid:      #0a0a0a;
  --amber:         #8b5a2b;
  --amber-light:   #a07038;
  --purple-accent: #7a46a0;
  --purple-glow:   rgba(122,70,160,0.2);
  --text-primary:  rgba(255,255,255,0.88);
  --text-sec:      rgba(255,255,255,0.45);
  --text-dim:      rgba(255,255,255,0.22);
  --bubble-me:     #2d1040;
  --bubble-them:   #111018;
  --bubble-me-brd: rgba(122,70,160,0.3);
  --bubble-them-brd: rgba(255,255,255,0.06);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{
  height:100%;height:100dvh;
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--dusk-deep);
  color:var(--text-primary);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:background 0.3s,color 0.3s;
}
.bg-base{position:fixed;inset:0;background:var(--dusk-deep);z-index:-3;}
.bg-glow{
  position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%,rgba(155,89,182,0.12) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 85% 80%,rgba(201,123,58,0.08) 0%,transparent 60%);
}
.bg-pattern{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;opacity:1;}
.bg-pattern svg{position:absolute;inset:0;width:100%;height:100%;}
.bp-sym{transform-origin:center;animation:bpDrift linear infinite;will-change:transform,opacity;}
@keyframes bpDrift{
  0%   { transform:translateY(0px)   rotate(0deg)   scale(1);   opacity:var(--op-from); }
  30%  { transform:translateY(-8px)  rotate(4deg)   scale(1.02);opacity:var(--op-to); }
  60%  { transform:translateY(-3px)  rotate(-3deg)  scale(0.98);opacity:var(--op-mid); }
  100% { transform:translateY(0px)   rotate(0deg)   scale(1);   opacity:var(--op-from); }
}

/* ── Header ── */
.chat-header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:10px;
  padding:0 12px;height:56px;
  background:linear-gradient(180deg,rgba(18,8,18,0.96) 0%,rgba(18,8,18,0.88) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;
}
.btn-back{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;
  color:var(--text-sec);cursor:pointer;
  transition:background 0.15s,color 0.15s;flex-shrink:0;
}
.btn-back:hover{background:rgba(255,255,255,0.07);color:var(--text-primary);}
.btn-back svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.recipient-info{
  display:flex;align-items:center;gap:10px;flex:1;min-width:0;
  cursor:pointer;border-radius:var(--r-md);
  padding:4px 6px;margin:-4px -6px;
  transition:background 0.15s;
}
.recipient-info:hover{background:rgba(255,255,255,0.05);}
.avatar-wrap{position:relative;flex-shrink:0;}
.header-avatar{
  width:38px;height:38px;border-radius:50%;
  object-fit:cover;
  border:1.5px solid rgba(255,255,255,0.12);
  flex-shrink:0;overflow:hidden;
}
.avatar-initials{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-accent),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
  border:1.5px solid rgba(255,255,255,0.12);flex-shrink:0;
}
.header-text{min-width:0;flex:1;}
.header-name{
  display:flex;align-items:center;gap:5px;
  font-size:15px;font-weight:600;color:var(--text-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-name .name-badges{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.badge-icon{width:14px;height:14px;object-fit:contain;}
.feed-badge{
  font-size:10px;font-weight:700;
  background:linear-gradient(135deg,var(--amber),#a86028);
  color:#fff;padding:1px 5px;border-radius:4px;letter-spacing:0.3px;
}
.header-sub{font-size:11.5px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.typing-sub{color:var(--purple-accent);font-style:italic;}
.header-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.icon-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;color:var(--text-sec);cursor:pointer;
  transition:background 0.15s,color 0.15s;
}
.icon-btn:hover{background:rgba(255,255,255,0.07);color:var(--text-primary);}
.icon-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Pinned message bar ── */
.pinned-bar{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(155,89,182,0.08);
  border-bottom:1px solid rgba(155,89,182,0.15);
  cursor:pointer;flex-shrink:0;
  transition:background 0.15s;
}
.pinned-bar:hover{background:rgba(155,89,182,0.14);}
.pinned-bar.hidden{display:none;}
.pinned-icon{flex-shrink:0;width:16px;height:16px;color:var(--purple-accent);}
.pinned-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pinned-text{flex:1;min-width:0;}
.pinned-label{font-size:10.5px;font-weight:700;color:var(--purple-accent);text-transform:uppercase;letter-spacing:0.5px;}
.pinned-preview{font-size:13px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pinned-unpin{
  background:transparent;border:none;color:var(--text-dim);cursor:pointer;
  padding:4px;border-radius:50%;transition:color 0.15s,background 0.15s;flex-shrink:0;
}
.pinned-unpin:hover{color:var(--text-primary);background:rgba(255,255,255,0.07);}
.pinned-unpin svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Inline message formatting ── */
.msg-bold{font-weight:700;}
.msg-italic{font-style:italic;}
.msg-code-inline{
  font-family:'SF Mono',ui-monospace,monospace;
  font-size:0.875em;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:4px;padding:1px 5px;
}
.msg-code-block{
  display:block;margin:6px 0 2px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;overflow:hidden;
}
.msg-code-lang{
  display:block;
  font-family:'SF Mono',ui-monospace,monospace;
  font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--amber-light);
  padding:5px 10px 4px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(0,0,0,0.2);
}
.msg-code-pre{
  display:block;
  font-family:'SF Mono',ui-monospace,monospace;
  font-size:12.5px;white-space:pre-wrap;word-break:break-all;
  color:rgba(255,255,255,0.85);
  padding:8px 10px;margin:0;
  line-height:1.55;
}
.msg-quote{
  display:block;margin:4px 0 2px;
  border-left:3px solid var(--amber);
  background:rgba(201,123,58,0.07);
  border-radius:0 6px 6px 0;
  padding:5px 10px;
  color:var(--text-sec);
  font-style:italic;font-size:13.5px;
}
.msg-link{
  color:var(--amber-light);text-decoration:none;
  border-bottom:1px solid rgba(232,168,92,0.35);
  transition:border-color 0.15s;
}
.msg-link:hover{border-color:var(--amber-light);}
.date-sep{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;color:var(--text-dim);font-size:11.5px;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}

/* ── Message list ── */
.msg-list{
  flex:1;overflow-y:auto;
  padding:12px 0 8px;
  display:flex;flex-direction:column;
}
.msg-list::-webkit-scrollbar{width:3px;}
.msg-list::-webkit-scrollbar-track{background:transparent;}
.msg-list::-webkit-scrollbar-thumb{background:rgba(155,89,182,0.3);border-radius:2px;}
.load-spinner{
  display:flex;align-items:center;justify-content:center;
  padding:20px;color:var(--text-dim);font-size:13px;gap:8px;
}
.spin{
  width:16px;height:16px;border:2px solid rgba(155,89,182,0.2);
  border-top-color:var(--purple-accent);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.chat-skeleton{
  display:flex;flex-direction:column;gap:10px;
  padding:16px 14px;animation:skFadeIn 0.25s ease;
}
@keyframes skFadeIn{from{opacity:0}to{opacity:1}}
.sk-row{display:flex;align-items:flex-end;gap:8px;}
.sk-row.me{flex-direction:row-reverse;}
.sk-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:rgba(155,89,182,0.12);animation:shimmer 1.4s ease-in-out infinite;
}
.sk-bubble{
  border-radius:16px;height:36px;
  background:rgba(155,89,182,0.08);
  animation:shimmer 1.4s ease-in-out infinite;
}
.sk-row.them .sk-bubble{border-bottom-left-radius:4px;}
.sk-row.me  .sk-bubble{border-bottom-right-radius:4px;background:rgba(155,89,182,0.14);}
@keyframes shimmer{0%,100%{opacity:0.45}50%{opacity:1}}

/* ── Empty state ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;flex:1;gap:0;animation:skFadeIn 0.4s ease;
}
.empty-state svg{width:56px;height:56px;fill:none;stroke:currentColor;stroke-width:1.2;opacity:0.3;margin-bottom:16px;}
.empty-state-title{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:6px;text-align:center;}
.empty-state-sub{font-size:13.5px;color:var(--text-dim);text-align:center;line-height:1.5;}

/* ── Message row ── */
.msg-row{
  display:flex;align-items:flex-end;gap:6px;
  padding:1px 12px;
  animation:msgIn 0.18s ease;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-row.me{flex-direction:row-reverse;}
.msg-row .msg-avatar{
  width:28px;height:28px;border-radius:50%;
  object-fit:cover;
  background:linear-gradient(135deg,var(--purple-accent),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
  flex-shrink:0;align-self:flex-end;overflow:hidden;cursor:pointer;
}
.msg-row.me .msg-avatar{display:none;}
.msg-row.consecutive .msg-avatar{opacity:0;pointer-events:none;}
.bubble-wrap{
  display:flex;flex-direction:column;
  max-width:min(320px,76%);gap:2px;
}
.msg-row.me .bubble-wrap{align-items:flex-end;}

/* ── Sender name above bubble ── */
.sender-name{
  font-size:11.5px;font-weight:600;
  color:var(--purple-accent);
  padding:0 2px;margin-bottom:1px;
  cursor:pointer;
  display:flex;align-items:center;gap:4px;
}
.sender-name:hover{text-decoration:underline;}
.sender-name .sn-badge{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700;}
.sn-admin{background:rgba(155,89,182,0.2);color:var(--purple-accent);}
.sn-owner{background:rgba(201,123,58,0.2);color:var(--amber-light);}
.sn-premium{width:11px;height:11px;object-fit:contain;}
.sn-verified{width:11px;height:11px;object-fit:contain;}
.msg-row.consecutive .sender-name{display:none;}
.msg-row.me .sender-name{display:none;}

/* bubble */
.bubble{
  padding:8px 11px;border-radius:16px;border:1px solid;
  word-break:break-word;white-space:pre-wrap;
  font-size:14.5px;line-height:1.45;position:relative;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
.msg-row.them .bubble{
  background:var(--bubble-them);border-color:var(--bubble-them-brd);
  border-bottom-left-radius:4px;
}
.msg-row.me .bubble{
  background:var(--bubble-me);border-color:var(--bubble-me-brd);
  border-bottom-right-radius:4px;
}
.msg-row.them.consecutive .bubble{border-top-left-radius:4px;}
.msg-row.me.consecutive .bubble{border-top-right-radius:4px;}
.msg-row.them:not(.consecutive) .bubble::before{
  content:'';position:absolute;bottom:0;left:-7px;
  width:14px;height:14px;background:var(--bubble-them);
  clip-path:polygon(100% 0,100% 100%,0 100%);
}
.msg-row.me:not(.consecutive) .bubble::before{
  content:'';position:absolute;bottom:0;right:-7px;
  width:14px;height:14px;background:var(--bubble-me);
  clip-path:polygon(0 0,0 100%,100% 100%);
}
.bubble.deleted{
  background:transparent!important;border:1px dashed rgba(255,255,255,0.12)!important;
  color:var(--text-dim);font-style:italic;font-size:13px;padding:6px 10px;
}
.bubble-img{
  max-width:100%;border-radius:12px;cursor:pointer;display:block;
  object-fit:cover;max-height:300px;
}
.bubble-img.sticker{max-width:120px;max-height:120px;border-radius:0;cursor:default;}
.bubble-caption{font-size:13.5px;color:var(--text-primary);line-height:1.4;padding:5px 2px 2px;}

/* audio player */
.audio-player{display:flex;align-items:center;gap:8px;min-width:160px;}
.audio-btn{
  width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(155,89,182,0.3);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background 0.15s;
}
.audio-btn:hover{background:rgba(155,89,182,0.5);}
.audio-btn svg{width:14px;height:14px;fill:currentColor;}
.audio-progress{flex:1;height:3px;cursor:pointer;accent-color:var(--purple-accent);}
.audio-duration{font-size:11px;color:var(--text-dim);flex-shrink:0;min-width:30px;}

/* ── REPLY PREVIEW inside bubble ── */
.reply-preview{
  display:flex;align-items:stretch;
  background:rgba(255,255,255,0.07);
  border-left:3px solid var(--purple-accent);
  border-radius:6px;
  margin-bottom:6px;
  cursor:pointer;
  overflow:hidden;
  transition:background 0.12s;
  min-width:0;
  max-height:44px;
}
.reply-preview:hover{background:rgba(255,255,255,0.11);}
.reply-thumb{width:40px;height:40px;flex-shrink:0;object-fit:cover;}
.reply-body{
  display:flex;flex-direction:column;justify-content:center;
  padding:4px 8px;min-width:0;flex:1;
}
.reply-sender{font-size:11.5px;font-weight:700;color:var(--purple-accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-text{font-size:12px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* reactions */
.reactions-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.reaction-pill{
  display:flex;align-items:center;gap:3px;
  padding:3px 7px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06);
  font-size:13px;cursor:pointer;
  transition:background 0.12s,border-color 0.12s;
}
.reaction-pill:hover{background:rgba(255,255,255,0.1);}
.reaction-pill.mine{background:rgba(155,89,182,0.2);border-color:rgba(155,89,182,0.4);}
.reaction-count{font-size:12px;color:var(--text-sec);}

/* msg meta */
.msg-meta{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:var(--text-dim);
  padding:0 2px;
}
.msg-row.me .msg-meta{justify-content:flex-end;}
.tick-icon{width:16px;height:10px;}

/* typing indicator */
.typing-bubble{
  display:none;align-items:flex-end;gap:6px;
  padding:1px 12px;
}
.typing-bubble.show{display:flex;}
.typing-dots{
  background:var(--bubble-them);border:1px solid var(--bubble-them-brd);
  border-radius:16px;border-bottom-left-radius:4px;
  padding:10px 14px;display:flex;gap:4px;align-items:center;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--text-sec);
  animation:dotBounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.6);}40%{transform:scale(1);}}

/* ── Input area ── */
.input-area{
  flex-shrink:0;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(18,8,18,0.98) 0%,rgba(18,8,18,0.9) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.07);
  position:relative;
}
.reply-strip,.edit-strip{
  display:none;align-items:center;gap:10px;
  padding:6px 10px;margin-bottom:6px;
  background:rgba(155,89,182,0.1);
  border-left:3px solid var(--purple-accent);
  border-radius:4px;
}
.reply-strip.show,.edit-strip.show{display:flex;}
.strip-content{flex:1;min-width:0;}
.strip-label{font-size:11px;font-weight:700;color:var(--purple-accent);}
.strip-preview{font-size:12.5px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.strip-close{
  background:transparent;border:none;color:var(--text-dim);cursor:pointer;
  font-size:16px;padding:2px;line-height:1;flex-shrink:0;
}
.media-preview-strip{
  display:none;align-items:center;gap:8px;
  padding:6px 10px;margin-bottom:6px;
  background:rgba(255,255,255,0.04);border-radius:var(--r-sm);
}
.media-preview-strip.show{display:flex;}
.media-preview-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;}
.media-preview-name{font-size:12.5px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.media-preview-size{font-size:11px;color:var(--text-dim);}
.media-preview-close{background:transparent;border:none;color:var(--text-dim);cursor:pointer;margin-left:auto;font-size:14px;}
.recording-bar{
  display:none;align-items:center;gap:8px;
  padding:8px 10px;margin-bottom:6px;
  background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:var(--r-sm);
}
.recording-bar.show{display:flex;}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:recPulse 1s ease-in-out infinite;flex-shrink:0;}
@keyframes recPulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.rec-time{font-size:13px;font-weight:700;color:#ef4444;flex:1;}
.rec-cancel{background:transparent;border:1px solid rgba(239,68,68,0.3);color:#ef4444;cursor:pointer;border-radius:12px;font-size:12px;padding:3px 10px;}
.input-row{display:flex;align-items:flex-end;gap:8px;}
.attach-btn{
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:50%;
  background:transparent;border:none;color:var(--text-sec);cursor:pointer;
  transition:background 0.15s,color 0.15s;flex-shrink:0;
}
.attach-btn:hover{background:rgba(255,255,255,0.07);color:var(--text-primary);}
.attach-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.msg-input-wrap{
  flex:1;
  display:flex;align-items:flex-end;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:22px;padding:8px 10px 8px 14px;gap:8px;
  transition:border-color 0.15s;
}
.msg-input-wrap:focus-within{border-color:rgba(155,89,182,0.5);}
.msg-textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text-primary);font-size:14.5px;line-height:1.45;
  resize:none;min-height:22px;max-height:120px;
  font-family:inherit;overflow-y:auto;overflow-x:hidden;
}
.msg-textarea::-webkit-scrollbar{width:2px;}
.msg-textarea::-webkit-scrollbar-thumb{background:rgba(155,89,182,0.3);}
.msg-textarea::placeholder{color:var(--text-dim);}
.emoji-toggle{
  background:transparent;border:none;
  color:var(--text-dim);cursor:pointer;
  font-size:18px;line-height:1;padding:0;flex-shrink:0;
  transition:transform 0.15s,opacity 0.15s;align-self:flex-end;margin-bottom:1px;
}
.emoji-toggle:hover{transform:scale(1.15);opacity:1;}
.send-btn{
  display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-accent),#7a3fa0);
  border:none;color:#fff;cursor:pointer;
  transition:transform 0.15s,box-shadow 0.15s;
  flex-shrink:0;box-shadow:0 3px 12px rgba(155,89,182,0.35);
}
.send-btn:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(155,89,182,0.5);}
.send-btn:active{transform:scale(0.95);}
.send-btn svg{width:18px;height:18px;fill:currentColor;}
.send-btn.voice-mode{background:linear-gradient(135deg,#ef4444,#b91c1c);}
.send-btn.voice-mode svg{fill:none;stroke:#fff;stroke-width:2;}

/* feed-only bar (no input for subscribers) */
.feed-subscriber-bar{
  display:flex;align-items:center;justify-content:center;
  padding:10px 16px;background:rgba(201,123,58,0.06);
  border-top:1px solid rgba(201,123,58,0.12);
  font-size:13px;color:rgba(251,191,36,0.85);text-align:center;gap:10px;
  flex-shrink:0;
}
.feed-subscriber-bar svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}

/* ── Emoji picker ── */
.emoji-picker{
  position:absolute;bottom:calc(100% + 8px);right:10px;
  background:linear-gradient(180deg,#1e1428,#160e20);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--r-lg);padding:10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  display:none;z-index:200;width:296px;animation:ctxIn 0.12s ease;
}
.emoji-picker.show{display:block;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;}
.ep-btn{
  background:transparent;border:none;font-size:20px;cursor:pointer;
  padding:5px;border-radius:7px;transition:background 0.1s,transform 0.1s;line-height:1;
}
.ep-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.18);}

/* ── Context menu ── */
.ctx-menu{
  position:fixed;z-index:1000;
  background:linear-gradient(180deg,#1e1428,#160e20);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--r-md);overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);min-width:160px;
  animation:ctxIn 0.12s ease;
}
@keyframes ctxIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
.ctx-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;font-size:13.5px;color:var(--text-primary);
  cursor:pointer;transition:background 0.12s;
}
.ctx-item:hover{background:rgba(155,89,182,0.15);}
.ctx-item.danger{color:#ef4444;}
.ctx-item.danger:hover{background:rgba(239,68,68,0.1);}
.ctx-item svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.ctx-divider{height:1px;background:rgba(255,255,255,0.07);}
.quick-react{
  position:fixed;
  display:flex;align-items:center;
  background:linear-gradient(180deg,#1e1428,#160e20);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;padding:4px 8px;gap:2px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  animation:ctxIn 0.12s ease;z-index:1001;
}
.qr-btn{
  background:transparent;border:none;font-size:20px;cursor:pointer;
  padding:3px 4px;border-radius:8px;
  transition:transform 0.12s,background 0.12s;line-height:1;
}
.qr-btn:hover{transform:scale(1.25);background:rgba(255,255,255,0.08);}

/* ── Lightbox ── */
.lightbox{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,0.92);
  display:none;align-items:center;justify-content:center;
}
.lightbox.show{display:flex;}
.lightbox img{max-width:96vw;max-height:92vh;border-radius:var(--r-md);object-fit:contain;}
.lightbox-close{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,0.1);border:none;color:#fff;
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.lightbox-close:hover{background:rgba(255,255,255,0.2);}

/* ── Search overlay ── */
.search-overlay{
  position:fixed;inset:0;z-index:900;background:var(--dusk-deep);
  display:none;flex-direction:column;
}
.search-overlay.show{display:flex;}
.search-header{
  display:flex;align-items:center;gap:10px;padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;
}
.search-input{
  flex:1;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:8px 14px;
  color:var(--text-primary);font-size:14px;outline:none;
}
.search-input:focus{border-color:rgba(155,89,182,0.5);}
.search-results{flex:1;overflow-y:auto;padding:12px;}
.search-result-item{
  padding:10px 12px;border-radius:var(--r-sm);
  cursor:pointer;transition:background 0.12s;margin-bottom:4px;
}
.search-result-item:hover{background:rgba(255,255,255,0.05);}
.sr-sender{font-size:11.5px;font-weight:600;color:var(--purple-accent);margin-bottom:2px;}
.sr-preview{font-size:13.5px;color:var(--text-primary);line-height:1.4;}
.sr-preview mark{background:rgba(155,89,182,0.35);color:inherit;border-radius:2px;padding:0 1px;}
.sr-time{font-size:11px;color:var(--text-dim);margin-top:2px;}
.sr-empty{text-align:center;color:var(--text-dim);font-size:13.5px;padding:40px 16px;}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(72px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(30,20,40,0.95);
  border:1px solid rgba(255,255,255,0.1);
  padding:9px 16px;border-radius:24px;
  font-size:13px;color:var(--text-primary);
  white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity 0.2s,transform 0.2s;
  z-index:9999;backdrop-filter:blur(12px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Jump btn ── */
.jump-btn{
  position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));right:16px;
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-accent),#7a3fa0);
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(155,89,182,0.4);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s,transform 0.15s;z-index:50;
}
.jump-btn.show{opacity:1;pointer-events:auto;}
.jump-btn:hover{transform:scale(1.08);}
.jump-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.jump-unread-badge{
  position:absolute;top:-4px;right:-4px;
  background:#ef4444;color:#fff;
  font-size:10px;font-weight:700;min-width:16px;height:16px;
  border-radius:8px;padding:0 3px;
  display:flex;align-items:center;justify-content:center;
}

/* ── Highlight ── */
.msg-row.highlight .bubble{animation:highlightPulse 2s ease forwards;}
@keyframes highlightPulse{0%,100%{background:var(--bubble-them);}25%,75%{background:rgba(155,89,182,0.35);}}
.msg-row.me.highlight .bubble{animation:highlightPulseMe 2s ease forwards;}
@keyframes highlightPulseMe{0%,100%{background:var(--bubble-me);}25%,75%{background:rgba(155,89,182,0.45);}}

/* ── Group info sheet ── */
.group-sheet{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;
}
.group-sheet.show{display:flex;}
.gs-inner{
  width:100%;background:linear-gradient(180deg,#1e1428,#120812);
  border-top:1px solid rgba(255,255,255,0.1);
  border-radius:20px 20px 0 0;overflow:hidden;
  animation:slideUp 0.2s ease;max-height:92dvh;
  display:flex;flex-direction:column;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.gs-tabs{
  display:flex;border-bottom:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;
}
.gs-tab{
  flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;
  color:var(--text-sec);cursor:pointer;border-bottom:2px solid transparent;
  transition:color 0.15s,border-color 0.15s;
}
.gs-tab.active{color:var(--purple-accent);border-bottom-color:var(--purple-accent);}
.gs-content{flex:1;overflow-y:auto;}
/* info tab */
.gs-info{padding:16px 20px 24px;}
.gs-avatar-wrap{display:flex;justify-content:center;margin-bottom:12px;}
.gs-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid rgba(155,89,182,0.4);}
.gs-avatar-initials{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-accent),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;color:#fff;border:2px solid rgba(155,89,182,0.4);
}
.gs-name{
  text-align:center;font-size:20px;font-weight:700;
  color:var(--text-primary);margin-bottom:4px;
  word-break:break-word;line-height:1.3;
  display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;
}
.gs-type-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase;
}
.gs-type-space{background:rgba(155,89,182,0.2);color:var(--purple-accent);}
.gs-type-feed{background:rgba(201,123,58,0.2);color:var(--amber-light);}
.gs-bio{text-align:center;font-size:13.5px;color:var(--text-sec);line-height:1.5;margin-bottom:14px;padding:0 8px;}
.gs-stats{display:flex;gap:8px;margin-bottom:14px;}
.gs-stat{
  flex:1;text-align:center;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--r-sm);padding:8px 4px;
}
.gs-stat-val{font-size:15px;font-weight:700;color:var(--text-primary);}
.gs-stat-lbl{font-size:10px;color:var(--text-dim);margin-top:2px;}
.gs-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:14px;}
.gs-tag{
  font-size:11.5px;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text-sec);
}
.gs-tag.premium{background:rgba(201,123,58,0.12);border-color:rgba(201,123,58,0.3);color:var(--amber-light);}
.gs-actions{display:flex;gap:8px;flex-wrap:wrap;}
.gs-btn{
  flex:1;min-width:100px;
  padding:10px 12px;border-radius:var(--r-md);
  font-size:12.5px;font-weight:600;cursor:pointer;border:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:opacity 0.15s,transform 0.12s;
}
.gs-btn:hover{opacity:0.85;transform:scale(0.98);}
.gs-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.gs-btn.leave-btn{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.25);}
.gs-btn.copy-btn{background:rgba(255,255,255,0.07);color:var(--text-primary);border:1px solid rgba(255,255,255,0.1);}
.gs-btn.search-btn{background:rgba(255,255,255,0.07);color:var(--text-primary);border:1px solid rgba(255,255,255,0.1);}
.gs-btn.report-btn{background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.2);}
/* members tab */
.members-search-wrap{padding:12px 16px 8px;flex-shrink:0;}
.members-search{
  width:100%;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:8px 14px;
  color:var(--text-primary);font-size:13.5px;outline:none;
}
.members-search:focus{border-color:rgba(155,89,182,0.5);}
.members-list{padding:0 12px 24px;}
.member-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 8px;border-radius:var(--r-sm);
  cursor:pointer;transition:background 0.12s;
}
.member-item:hover{background:rgba(255,255,255,0.05);}
.member-avatar{
  width:40px;height:40px;border-radius:50%;
  object-fit:cover;background:linear-gradient(135deg,var(--purple-accent),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;
}
.member-info{flex:1;min-width:0;}
.member-name{
  display:flex;align-items:center;gap:4px;
  font-size:14px;font-weight:600;color:var(--text-primary);
}
.member-name-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-badge{font-size:9.5px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0;}
.mb-owner{background:rgba(201,123,58,0.2);color:var(--amber-light);}
.mb-admin{background:rgba(155,89,182,0.2);color:var(--purple-accent);}
.mb-premium{width:12px;height:12px;object-fit:contain;}
.mb-verified{width:12px;height:12px;object-fit:contain;}
.member-sub{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-ban-badge{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(239,68,68,0.15);color:#ef4444;flex-shrink:0;}

/* ── Member action sheet ── */
.member-action-sheet{
  position:fixed;inset:0;z-index:950;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;
}
.member-action-sheet.show{display:flex;}
.mas-inner{
  width:100%;background:linear-gradient(180deg,#1e1428,#120812);
  border-top:1px solid rgba(255,255,255,0.1);
  border-radius:20px 20px 0 0;overflow:hidden;
  animation:slideUp 0.2s ease;
}
.mas-profile{padding:16px 20px 12px;}
.mas-avatar-wrap{display:flex;justify-content:center;margin-bottom:10px;}
.mas-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid rgba(155,89,182,0.4);}
.mas-avatar-initials{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-accent),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:#fff;border:2px solid rgba(155,89,182,0.4);
}
.mas-name{text-align:center;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.mas-username{text-align:center;font-size:12.5px;color:var(--text-sec);margin-bottom:6px;}
.mas-xp{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:var(--r-sm);padding:8px 12px;margin-bottom:10px;}
.mas-xp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.mas-xp-level{font-size:12px;font-weight:700;color:var(--purple-accent);}
.mas-xp-label{font-size:11px;color:var(--text-dim);}
.xp-bar-bg{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple-accent),var(--amber));border-radius:2px;transition:width 0.4s;}
.mas-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-bottom:10px;}
.mas-tag{font-size:11px;padding:2px 8px;border-radius:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text-sec);}
.mas-tag.premium{background:rgba(201,123,58,0.12);border-color:rgba(201,123,58,0.3);color:var(--amber-light);}
.mas-tag.verified{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:#93c5fd;}
.mas-tag.admin{background:rgba(155,89,182,0.15);border-color:rgba(155,89,182,0.3);color:var(--purple-accent);}
.mas-tag.owner{background:rgba(201,123,58,0.15);border-color:rgba(201,123,58,0.3);color:var(--amber-light);}
.mas-actions{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 8px;}
.mas-btn{
  flex:1;min-width:80px;
  padding:9px 10px;border-radius:var(--r-sm);
  font-size:12px;font-weight:600;cursor:pointer;border:none;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:opacity 0.15s;
}
.mas-btn:hover{opacity:0.85;}
.mas-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.mas-btn.profile{background:rgba(99,102,241,0.12);color:#a5b4fc;border:1px solid rgba(99,102,241,0.25);}
.mas-btn.dm{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
.mas-btn.promote{background:rgba(155,89,182,0.15);color:var(--purple-accent);border:1px solid rgba(155,89,182,0.3);}
.mas-btn.demote{background:rgba(255,255,255,0.07);color:var(--text-primary);border:1px solid rgba(255,255,255,0.1);}
.mas-btn.ban{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25);}
.mas-btn.unban{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
.mas-btn.mute{background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.2);}
.mas-btn.unmute{background:rgba(255,255,255,0.07);color:var(--text-primary);border:1px solid rgba(255,255,255,0.1);}
.mas-divider{height:1px;background:rgba(255,255,255,0.07);margin:8px 16px;}
.mas-cancel-row{padding:0 16px 16px;}
.mas-cancel{
  width:100%;padding:11px;border-radius:var(--r-sm);
  background:rgba(255,255,255,0.06);color:var(--text-sec);
  border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:13.5px;font-weight:600;
}

/* ── Join page overlay ── */
.join-overlay{
  position:fixed;inset:0;z-index:800;
  background:var(--dusk-deep);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.join-overlay.show{display:flex;}
.join-card{
  background:linear-gradient(180deg,#1e1428,#160e1e);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;padding:32px 24px;
  max-width:360px;width:100%;text-align:center;
  animation:ctxIn 0.2s ease;
}
.join-avatar-wrap{display:flex;justify-content:center;margin-bottom:16px;}
.join-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid rgba(155,89,182,0.4);}
.join-avatar-initials{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-accent),var(--amber));
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:700;color:#fff;border:2px solid rgba(155,89,182,0.4);
}

<script>
// ═══════════════════════════════════════════════════════════════════════
//  EXILE — group.html
//  Handles /space/:spaceId  /feed/:feedId
//          /join-space/:joinId  /join-feed/:joinId
// ═══════════════════════════════════════════════════════════════════════

// ── URL parsing ──────────────────────────────────────────────────────
const pathParts  = window.location.pathname.split('/').filter(Boolean);
const PAGE_TYPE  = pathParts[0]; // space | feed | join-space | join-feed
const GROUP_ID   = pathParts[1]; // spaceId | feedId | joinId
const IS_JOIN    = PAGE_TYPE === 'join-space' || PAGE_TYPE === 'join-feed';
const IS_FEED    = PAGE_TYPE === 'feed' || PAGE_TYPE === 'join-feed';
const GROUP_TYPE = IS_FEED ? 'feed' : 'space';
const URL_MSG_ID = new URLSearchParams(window.location.search).get('message');

// ── State ────────────────────────────────────────────────────────────
let ME = null, GROUP = null, MY_MEMBER = null;
let IS_ADMIN = false, IS_OWNER = false, CAN_SEND = false;

const messages   = {};
const msgOrder   = [];
let oldestId = null, newestId = null;
let loadingOlder = false, allLoaded = false;

let ws = null, wsReady = false;
let groupTyping = [], typingTimeout = null;
let isTyping = false, myTypingTimer = null;

let replyTo = null, editingMsg = null;
let ctxMsgId = null, selectedFile = null;
let mediaRecorder = null, audioChunks = [], recInterval = null, recSeconds = 0;
let unreadBelowCount = 0, atBottom = true;

let allMembers = [];
let activeMemberTarget = null; // member obj shown in sheet

// theme
(function(){if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark-mode');})();

// ── INIT ─────────────────────────────────────────────────────────────
async function init() {
  if (!GROUP_ID) { showToast('Invalid URL'); return; }

  if (IS_JOIN) {
    await loadJoinPage();
    return;
  }

  try {
    const [meRes, groupRes] = await Promise.all([
      fetch('/api/me', {credentials:'include'}),
      fetch(`/api/${GROUP_TYPE}s/${GROUP_ID}`, {credentials:'include'}),
    ]);

    if (!meRes.ok) { window.location.href = '/login'; return; }
    ME = (await meRes.json()).user;

    if (!groupRes.ok) { showToast('Group not found'); return; }
    const gd = await groupRes.json();
    GROUP = gd[GROUP_TYPE] || gd;

    if (GROUP.banned) {
      document.getElementById('skeleton').remove();
      document.getElementById('msgList').innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg><div class="empty-state-title">This group is banned</div><div class="empty-state-sub">${esc(GROUP.banReason||'Violation of community guidelines')}</div></div>`;
      return;
    }

    // Identify membership
    MY_MEMBER  = getMember(ME.userId);
    IS_ADMIN   = MY_MEMBER?.isAdmin || false;
    IS_OWNER   = MY_MEMBER?.isOwner || false;

    if (!MY_MEMBER || MY_MEMBER.isBanned) {
      // redirect to join page
      const joinId = GROUP.joinId;
      window.location.replace(`/${IS_FEED?'join-feed':'join-space'}/${joinId}`);
      return;
    }

    // Feeds: only admins can send
    CAN_SEND = IS_FEED ? (IS_ADMIN || IS_OWNER) : true;
    if (MY_MEMBER.isMuted) CAN_SEND = false;

    renderHeader();
    renderInput();
    renderPinnedBar();
    await loadMessages();
    connectWS();

    if (URL_MSG_ID) {
      setTimeout(()=>scrollToMessage(URL_MSG_ID, true), 400);
    } else {
      scrollToBottom(false);
    }
  } catch(e) {
    console.error('Init error:', e);
    showToast('Failed to load group');
  }
}

// ── Join page ─────────────────────────────────────────────────────────
async function loadJoinPage() {
  document.getElementById('msgList').style.display   = 'none';
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('joinOverlay').classList.add('show');

  try {
    const meRes = await fetch('/api/me', {credentials:'include'});
    if (meRes.ok) ME = (await meRes.json()).user;

    // Resolve group from joinId
    const col  = IS_FEED ? 'feeds' : 'spaces';
    const idField = IS_FEED ? 'feedId' : 'spaceId';
    const res  = await fetch(`/api/${col}/by-join/${GROUP_ID}`, {credentials:'include'});
    if (!res.ok) {
      document.getElementById('joinTitle').textContent = 'Invite Not Found';
      document.getElementById('joinBio').textContent   = 'This invite link may be invalid or expired.';
      document.getElementById('joinBtn').style.display = 'none';
      return;
    }
    const data = await res.json();
    GROUP = data[IS_FEED?'feed':'space'];
    renderJoinCard();
  } catch {
    document.getElementById('joinTitle').textContent = 'Error';
    document.getElementById('joinBtn').style.display = 'none';
  }
}

function renderJoinCard() {
  const g = GROUP;
  // Avatar
  const wrap = document.getElementById('joinAvatarWrap');
  if (g.profileImage) {
    const img = document.createElement('img'); img.src = g.profileImage; img.className = 'join-avatar'; img.alt = g.name;
    wrap.appendChild(img);
  } else {
    const av = document.createElement('div'); av.className = 'join-avatar-initials'; av.textContent = initials(g.name);
    wrap.appendChild(av);
  }
  document.getElementById('joinTitle').textContent    = g.name;

  tb.className = `join-type-badge ${IS_FEED?'join-badge-feed':'join-badge-space'}`;
  document.getElementById('joinMembers').textContent  = `${g.memberCount||0} member${(g.memberCount||0)!==1?'s':''}`;
  document.title = `Join ${g.name} — EXILE`;
}

async function doJoin() {
  if (!ME) { window.location.href = '/login'; return; }
  const btn = document.getElementById('joinBtn');
  btn.disabled = true; btn.textContent = 'Joining…';
  try {
    const endpoint = IS_FEED
      ? `/api/feeds/join/${GROUP_ID}`
      : `/api/spaces/join/${GROUP_ID}`;
    const res  = await fetch(endpoint, {method:'POST', credentials:'include'});
    const data = await res.json();
    if (res.ok) {
      const newId = data.spaceId || data.feedId;
      window.location.replace(`/${GROUP_TYPE}/${newId}`);
    } else {
      if (data.error?.includes('Already a member')) {
        // Already member, just go there
        const newId = GROUP[IS_FEED?'feedId':'spaceId'];
        if (newId) window.location.replace(`/${GROUP_TYPE}/${newId}`);
        return;
      }
      showToast(data.error || 'Failed to join');
      btn.disabled = false; btn.textContent = 'Join';
    }
  } catch { showToast('Network error'); btn.disabled = false; btn.textContent = 'Join'; }
}

// ── Load messages ─────────────────────────────────────────────────────
async function loadMessages(direction = 'initial') {
  if (loadingOlder && direction !== 'initial') return;
  if (allLoaded && direction === 'older') return;

  const list = document.getElementById('msgList');

  if (direction === 'initial') {
    // Show skeleton (already in DOM)
  } else if (direction === 'older') {
    loadingOlder = true;
    const spinner = document.createElement('div');
    spinner.className = 'load-spinner'; spinner.id = 'loadSpinner';
    spinner.innerHTML = '<div class="spin"></div> Loading older…';
    list.prepend(spinner);
  }

  try {
    let url = `/api/${GROUP_TYPE}/${GROUP_ID}/messages?limit=40`;
    if (direction === 'older' && oldestId) url += `&before=${oldestId}`;

    const res  = await fetch(url, {credentials:'include'});
    const data = await res.json();

    if (data.banned) { showToast('Group is banned'); return; }

    const msgs = data.messages || [];
    document.getElementById('skeleton')?.remove();
    document.getElementById('loadSpinner')?.remove();

    if (msgs.length === 0) {
      if (direction === 'initial') {
        const es = document.createElement('div'); es.className = 'empty-state'; es.id = 'emptyState';
        es.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><div class="empty-state-title">No messages yet</div><div class="empty-state-sub">Be the first to say something!</div>`;
        list.insertBefore(es, document.getElementById('typingBubble'));
      }
      if (direction === 'older') { allLoaded = true; loadingOlder = false; }
      return;
    }

    if (msgs.length < 40 && direction === 'older') allLoaded = true;

    const typing = document.getElementById('typingBubble');
    const prevScrollHeight = list.scrollHeight;

    msgs.forEach(m => {
      messages[m.messageId] = m;
      if (!msgOrder.includes(m.messageId)) {
        if (direction === 'older') msgOrder.unshift(m.messageId);
        else msgOrder.push(m.messageId);
      }
    });

    if (direction === 'older') {
      const frag = document.createDocumentFragment();
      msgs.forEach(m => frag.appendChild(buildMessageRow(m)));
      list.insertBefore(frag, list.firstChild);
      oldestId = msgs[0].messageId;
      list.scrollTop = list.scrollHeight - prevScrollHeight;
    } else {
      msgs.forEach(m => {
        const row = buildMessageRow(m);
        list.insertBefore(row, typing);
      });
      oldestId  = msgs[0].messageId;
      newestId  = msgs[msgs.length - 1].messageId;
    }

    applyConsecutiveClasses();
    insertDateSeparators();

    // Load pinned message preview
    if (GROUP.pinnedMessageId && data.pinnedMessage) {
      updatePinnedPreview(data.pinnedMessage);
    } else if (GROUP.pinnedMessageId && messages[GROUP.pinnedMessageId]) {
      updatePinnedPreview(messages[GROUP.pinnedMessageId]);
    }

  } catch(e) {
    console.error('loadMessages error:', e);
    showToast('Failed to load messages');
  } finally {
    loadingOlder = false;
  }
}

function updatePinnedPreview(msg) {
  const preview = msg.type === 'text'
    ? (msg.content?.text || '').slice(0, 60)
    : `[${msg.type}]`;
  document.getElementById('pinnedPreview').textContent = preview;
  document.getElementById('pinnedBar').classList.remove('hidden');
}

// ── WebSocket ─────────────────────────────────────────────────────────
function connectWS() {
  if (ws && ws.connected) return;
  const token = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('token='))?.slice(6) || '';
  ws = io('/', {
    auth:                  { token },
    transports:            ['websocket'],
    reconnection:          true,
    reconnectionAttempts:  Infinity,
    reconnectionDelay:     2000,
    reconnectionDelayMax:  30000,
    randomizationFactor:   0.5,
  });

  ws.on('connect', () => {
    wsReady = true;
    console.log('Socket.IO connected', ws.id);
    // Mark as read on connect
    if (newestId) ws.emit('groupRead', { groupId: GROUP_ID, upToMessageId: newestId });
  });

  ws.on('disconnect', () => { wsReady = false; });
  ws.on('connect_error', (err) => console.warn('Socket.IO error:', err.message));
  ws.on('message', handleWsMessage);
}

function handleWsMessage(msg) {
  if (!msg || !msg.type) return;

  if (msg.type === 'newGroupMessage') {
    const m = msg.message;
    if (!m || (m.groupId || m.chatId) !== GROUP_ID) return;
    if (messages[m.messageId]) return;
    document.getElementById('emptyState')?.remove();
    messages[m.messageId] = m;
    msgOrder.push(m.messageId);
    newestId = m.messageId;
    const list   = document.getElementById('msgList');
    const typing = document.getElementById('typingBubble');
    const row    = buildMessageRow(m);
    list.insertBefore(row, typing);
    applyConsecutiveClasses();
    insertDateSeparators();
    if (atBottom) {
      scrollToBottom(true);
      ws.emit('groupRead', { groupId: GROUP_ID, upToMessageId: m.messageId });
    } else {
      unreadBelowCount++;
      updateJumpBadge();
    }
    return;
  }

  if (msg.type === 'groupMessageDeleted') {
    if (msg.groupId !== GROUP_ID) return;
    const m = messages[msg.messageId]; if (!m) return;
    m.deleted = true; m.content = {};
    refreshRow(msg.messageId);
    return;
  }

  if (msg.type === 'groupMessageEdited' || msg.type === 'messageEdited') {
    if (msg.groupId && msg.groupId !== GROUP_ID) return;
    const m = messages[msg.messageId]; if (!m) return;
    m.content.text = msg.text;
    m.editedAt     = msg.editedAt;
    refreshRow(msg.messageId);
    return;
  }

  if (msg.type === 'groupMessageReaction') {
    if (msg.groupId !== GROUP_ID) return;
    const m = messages[msg.messageId]; if (!m) return;
    m.reactions = msg.reactions;
    refreshReactions(msg.messageId);
    return;
  }

  if (msg.type === 'groupTyping') {
    if (msg.groupId !== GROUP_ID) return;
    showGroupTyping(msg.typers || []);
    return;
  }

  if (msg.type === 'messagePinned') {
    if (msg.groupId !== GROUP_ID) return;
    GROUP.pinnedMessageId = msg.messageId;
    if (msg.messageId) {
      document.getElementById('pinnedBar').classList.remove('hidden');
      if (IS_ADMIN || IS_OWNER) document.getElementById('pinnedUnpinBtn').style.display = '';
      const m = messages[msg.messageId];
      if (m) updatePinnedPreview(m);
    } else {
      document.getElementById('pinnedBar').classList.add('hidden');
    }
    return;
  }

  if (msg.type === 'memberJoined') {
    if ((msg.spaceId||msg.feedId) !== GROUP_ID) return;
    if (msg.member) {
      GROUP.members = GROUP.members || [];
      if (!GROUP.members.find(m=>m.userId===msg.member.userId)) {
        GROUP.members.push(msg.member);
        GROUP.memberCount = (GROUP.memberCount||0) + 1;
        document.getElementById('headerSub').textContent = `${GROUP.memberCount} member${GROUP.memberCount!==1?'s':''}`;
      }
    }
    return;
  }

  if (msg.type === 'memberLeft' || msg.type === 'memberBanned') {
    if (msg.groupId !== GROUP_ID) return;
    const uid = msg.userId || msg.targetId;
    if (uid === ME?.userId) { showToast('You were removed from this group'); setTimeout(()=>window.location.href='/', 1500); return; }
    if (GROUP.members) {
      if (msg.type === 'memberLeft') GROUP.members = GROUP.members.filter(m=>m.userId!==uid);
      else {
        const m_ = GROUP.members.find(m=>m.userId===uid);
        if (m_) { m_.isBanned = true; m_.isAdmin = false; }
        const am_ = allMembers.find(m=>m.userId===uid);
        if (am_) { am_.isBanned = true; am_.isAdmin = false; }
        else allMembers = [...(GROUP.members || [])];
        const sheet = document.getElementById('groupSheet');
        if (sheet?.classList.contains('show') && gsActiveTab === 1) filterMembers();
      }
      GROUP.memberCount = Math.max(0, (GROUP.memberCount||1) - 1);
      document.getElementById('headerSub').textContent = `${GROUP.memberCount} member${GROUP.memberCount!==1?'s':''}`;
    }
    return;
  }

  if (msg.type === 'memberPromoted') {
    if (msg.groupId !== GROUP_ID) return;
    const m_ = getMember(msg.targetId);
    if (m_) { m_.isAdmin = true; m_.isBanned = false; }
    // Sync allMembers
    const am_ = allMembers.find(m => m.userId === msg.targetId);
    if (am_) { am_.isAdmin = true; am_.isBanned = false; }
    else if (m_) allMembers = [...(GROUP.members || [])];
    const sheet = document.getElementById('groupSheet');
    if (sheet?.classList.contains('show') && gsActiveTab === 1) filterMembers();
    if (msg.targetId === ME?.userId) { IS_ADMIN = true; CAN_SEND = true; renderInput(); renderHeader(); showToast('You are now an admin!'); }
    return;
  }

  if (msg.type === 'memberDemoted') {
    if (msg.groupId !== GROUP_ID) return;
    const m_ = getMember(msg.targetId);
    if (m_) m_.isAdmin = false;
    const am_ = allMembers.find(m => m.userId === msg.targetId);
    if (am_) am_.isAdmin = false;
    else allMembers = [...(GROUP.members || [])];
    const sheet = document.getElementById('groupSheet');
    if (sheet?.classList.contains('show') && gsActiveTab === 1) filterMembers();
    if (msg.targetId === ME?.userId) { IS_ADMIN = false; if (IS_FEED) { CAN_SEND = false; renderInput(); } showToast('Your admin rights were revoked'); }
    return;
  }

  if (msg.type === 'memberMuted') {
    if (msg.groupId !== GROUP_ID) return;
    const m_ = getMember(msg.targetId);
    if (m_) m_.isMuted = msg.muted;
    const am_ = allMembers.find(m => m.userId === msg.targetId);
    if (am_) am_.isMuted = msg.muted;
    else allMembers = [...(GROUP.members || [])];
    const sheet = document.getElementById('groupSheet');
    if (sheet?.classList.contains('show') && gsActiveTab === 1) filterMembers();
    if (msg.targetId === ME?.userId) {
      CAN_SEND = !msg.muted;
      renderInput();
      showToast(msg.muted ? 'You have been muted' : 'You have been unmuted');
    }
    return;
  }

  if (msg.type === 'groupUpdated') {
    if ((msg.spaceId||msg.feedId) !== GROUP_ID) return;
    Object.assign(GROUP, msg.updates || {});
    renderHeader();
    return;
  }
}

function showGroupTyping(typers) {
  const others = typers.filter(t => t.userId !== ME?.userId);
  const bubble = document.getElementById('typingBubble');
  if (!others.length) { bubble.classList.remove('show'); return; }
  const names = others.map(t => t.name);
  let label;
  if (names.length === 1) label = `${names[0]} is typing…`;
  else if (names.length === 2) label = `${names[0]} and ${names[1]} are typing…`;
  else label = `${names[0]}, ${names[1]} and ${names.length-2} others are typing…`;
  document.getElementById('headerSub').textContent = label;
  bubble.classList.add('show');
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    bubble.classList.remove('show');
    document.getElementById('headerSub').textContent = `${GROUP?.memberCount||0} member${(GROUP?.memberCount||0)!==1?'s':''}`;
  }, 3000);
}

// ── Build message row ─────────────────────────────────────────────────
function buildMessageRow(msg) {
  const isMe = msg.senderId === ME?.userId;
  const row  = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'them'}`;
  row.dataset.msgId    = msg.messageId;
  row.dataset.senderId = msg.senderId;
  row.dataset.sentAt   = msg.sentAt;
  row.dataset.type     = msg.type;

  // Avatar (their side)
  if (!isMe) {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.title = msg.senderName || 'User';
    if (msg.senderAvatar) {
      const img = document.createElement('img');
      img.src = msg.senderAvatar; img.style.cssText = 'width:100%;height:100%;border-radius:50%;object-fit:cover;';
      img.onerror = () => { av.textContent = initials(msg.senderName); };
      av.appendChild(img);
    } else {
      av.textContent = initials(msg.senderName || '?');
    }
    av.onclick = (e) => { e.stopPropagation(); openMemberSheet(msg.senderId); };
    row.appendChild(av);
  }

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  // Sender name above bubble (for non-me, non-consecutive)
  const nameEl = document.createElement('div');
  nameEl.className = 'sender-name';
  nameEl.dataset.senderNameFor = msg.messageId;
  nameEl.onclick = (e) => { e.stopPropagation(); openMemberSheet(msg.senderId); };

  const nameSpan = document.createElement('span');
  nameSpan.textContent = msg.senderName || 'User';
  nameEl.appendChild(nameSpan);

  // Position badge
  const pos = msg.senderPosition;
  if (pos === 'owner') {
    const b = document.createElement('span'); b.className = 'sn-badge sn-owner'; b.textContent = 'Owner';
    nameEl.appendChild(b);
  } else if (pos === 'admin') {
    const b = document.createElement('span'); b.className = 'sn-badge sn-admin'; b.textContent = 'Admin';
    nameEl.appendChild(b);
  }
  // Premium / verified micro-badges
  if (msg.senderPremium) { const i=document.createElement('img');i.src='/premium.png';i.className='sn-premium';nameEl.appendChild(i); }
  if (msg.senderVerified){ const i=document.createElement('img');i.src='/verified.png';i.className='sn-verified';nameEl.appendChild(i); }

  wrap.appendChild(nameEl);
  wrap.appendChild(buildBubble(msg, isMe));

  // Reactions
  const reactRow = buildReactionsRow(msg, isMe);
  if (reactRow) wrap.appendChild(reactRow);

  wrap.appendChild(buildMeta(msg, isMe));
  row.appendChild(wrap);
  addContextListeners(row, msg);
  return row;
}

function buildBubble(msg, isMe) {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.dataset.msgId = msg.messageId;

  if (msg.deleted) {
    bubble.classList.add('deleted');
    bubble.textContent = isMe ? 'You deleted this message' : 'This message was deleted';
    return bubble;
  }

  // Reply preview
  if (msg.replyTo && !msg.replyTo.deleted) {
    const rt = msg.replyTo;
    let previewText = rt.preview || '';
    if (!previewText) {
      if (rt.type === 'text') previewText = (rt.content?.text || '').slice(0, 60);
      else previewText = `[${rt.type || 'message'}]`;
    }
    const rp = document.createElement('div'); rp.className = 'reply-preview';
    if ((rt.type==='image'||rt.type==='image_caption') && rt.content?.mediaUrl) {
      const thumb = document.createElement('img'); thumb.className = 'reply-thumb'; thumb.src = rt.content.mediaUrl; thumb.alt = '';
      rp.appendChild(thumb);
    }
    const body = document.createElement('div'); body.className = 'reply-body';
    body.innerHTML = `<div class="reply-sender">${esc(rt.senderName||'User')}</div><div class="reply-text">${esc(previewText)}</div>`;
    rp.appendChild(body);
    rp.onclick = (e) => { e.stopPropagation(); scrollToMessage(rt.messageId, true); };
    bubble.appendChild(rp);
  }

  const type = msg.type, c = msg.content || {};

  if (type === 'text') {
    bubble.appendChild(makeTextContent(c.text || ''));
  } else if (type === 'image') {
    const img = makeMediaImg(c.mediaUrl, false);
    bubble.style.padding = '4px'; bubble.appendChild(img);
  } else if (type === 'image_caption') {
    const img = makeMediaImg(c.mediaUrl, false);
    bubble.style.padding = '4px'; bubble.appendChild(img);
    if (c.caption) {
      const cap = document.createElement('div'); cap.className = 'bubble-caption';
      cap.style.padding = '5px 7px 3px'; cap.appendChild(makeTextContent(c.caption));
      bubble.appendChild(cap);
    }
  } else if (type === 'sticker') {
    bubble.appendChild(makeMediaImg(c.mediaUrl, true));
    bubble.style.cssText += 'background:transparent!important;border-color:transparent!important;padding:2px!important;';
  } else if (type === 'audio' || type === 'voice') {
    bubble.appendChild(buildAudioPlayer(c.mediaUrl));
  } else {
    bubble.appendChild(makeTextContent(c.text || `[${type}]`));
  }

  return bubble;
}

function makeMediaImg(url, isSticker) {
  const img = document.createElement('img');
  img.className = `bubble-img${isSticker ? ' sticker' : ''}`;
  img.src = url; img.alt = isSticker ? 'Sticker' : 'Image'; img.loading = 'lazy';
  if (!isSticker) img.onclick = (e) => { e.stopPropagation(); openLightbox(url); };
  return img;
}

function buildAudioPlayer(url) {
  const audio = new Audio(url);
  const wrap = document.createElement('div'); wrap.className = 'audio-player';
  const btn = document.createElement('button'); btn.className = 'audio-btn';
  btn.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
  const progress = document.createElement('input'); progress.type='range'; progress.className='audio-progress'; progress.value=0; progress.min=0; progress.max=100;
  const dur = document.createElement('span'); dur.className='audio-duration'; dur.textContent='0:00';
  btn.onclick = (e) => { e.stopPropagation(); if(audio.paused){audio.play();btn.innerHTML=`<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;}else{audio.pause();btn.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;} };
  audio.addEventListener('timeupdate',()=>{if(audio.duration){progress.value=(audio.currentTime/audio.duration)*100;dur.textContent=formatDuration(audio.currentTime);}});
  audio.addEventListener('loadedmetadata',()=>{dur.textContent=formatDuration(audio.duration);});
  audio.addEventListener('ended',()=>{btn.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;progress.value=0;});
  progress.oninput=()=>{if(audio.duration)audio.currentTime=(progress.value/100)*audio.duration;};
  wrap.append(btn,progress,dur); return wrap;
}

function buildReactionsRow(msg, isMe) {
  const reactions = msg.reactions || {};
  const entries   = Object.entries(reactions).filter(([,v]) => {
    const uids = Array.isArray(v) ? v : (v.users || []);
    return uids.length > 0;
  });
  if (!entries.length) return null;
  const row = document.createElement('div'); row.className = 'reactions-row'; row.dataset.reactFor = msg.messageId;
  entries.forEach(([emoji, val]) => {
    const uids  = Array.isArray(val) ? val : (val.users || []);
    const mine  = uids.includes(ME?.userId);
    const pill  = document.createElement('button');
    pill.className = `reaction-pill${mine?' mine':''}`;
    pill.innerHTML = `${emoji}<span class="reaction-count">${uids.length}</span>`;
    pill.onclick = (e) => { e.stopPropagation(); sendReaction(msg.messageId, emoji); };
    row.appendChild(pill);
  });
  return row;
}

function buildMeta(msg, isMe) {
  const meta = document.createElement('div');
  meta.className = 'msg-meta'; meta.dataset.metaFor = msg.messageId;
  let html = `<span>${formatTime(msg.sentAt)}</span>`;
  if (msg.editedAt) html += `<span style="font-size:10px;opacity:0.6;">edited</span>`;
  meta.innerHTML = html;
  return meta;
}

function applyConsecutiveClasses() {
  const rows = document.querySelectorAll('.msg-row');
  let prevSender = null, prevTime = null;
  rows.forEach(row => {
    const sid = row.dataset.senderId, sat = row.dataset.sentAt;
    const consecutive = sid && sid === prevSender && sat && prevTime && (new Date(sat) - new Date(prevTime)) < 90000;
    row.classList.toggle('consecutive', !!consecutive);
    prevSender = sid; prevTime = sat;
  });
}

function insertDateSeparators() {
  document.querySelectorAll('.date-sep').forEach(el => el.remove());
  const list = document.getElementById('msgList');
  const rows = [...list.querySelectorAll('.msg-row')];
  let lastDate = null;
  rows.forEach(row => {
    const sat = row.dataset.sentAt; if (!sat) return;
    const d = new Date(sat).toDateString();
    if (d !== lastDate) {
      const sep = document.createElement('div'); sep.className = 'date-sep'; sep.textContent = formatDate(new Date(sat));
      list.insertBefore(sep, row); lastDate = d;
    }
  });
}

// ── Send message ──────────────────────────────────────────────────────
async function sendOrRecord() {
  const ta = document.getElementById('msgTextarea');
  const text = ta.value.trim();

  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    stopVoiceRecording(); return;
  }

  if (!text && !selectedFile && !mediaRecorder) {
    startVoiceRecording(); return;
  }

  if (editingMsg) { await doEdit(); return; }

  if (!CAN_SEND) { showToast('You cannot send messages here'); return; }

  // Optimistic render
  if (text) {
    const optMsg = {
      messageId: 'opt_' + Date.now(),
      groupId: GROUP_ID, chatId: GROUP_ID, chatType: GROUP_TYPE,
      senderId: ME.userId,
      senderName: ME.name, senderUsername: ME.username,
      senderAvatar: ME.profilePicture,
      senderPremium: ME.premium, senderVerified: ME.verified,
      senderPosition: IS_OWNER ? 'owner' : IS_ADMIN ? 'admin' : 'member',
      type: 'text', content: { text },
      replyTo: replyTo ? {...replyTo} : null,
      sentAt: new Date().toISOString(), reactions: {},
    };
    document.getElementById('emptyState')?.remove();
    const list   = document.getElementById('msgList');
    const typing = document.getElementById('typingBubble');
    const row    = buildMessageRow(optMsg);
    row.dataset.optimistic = '1';
    list.insertBefore(row, typing);
    applyConsecutiveClasses();
    insertDateSeparators();
    scrollToBottom(true);
  }

  const savedReply = replyTo;
  ta.value = ''; autoGrow(); updateSendBtn();
  cancelReply();

  try {
    const fd = new FormData();
    fd.append('type', selectedFile ? (selectedFile.type.startsWith('image/') ? (text ? 'image_caption' : 'image') : (selectedFile.type.startsWith('audio/') ? 'audio' : 'image')) : 'text');
    if (text) fd.append(fd.get('type') === 'text' ? 'text' : 'caption', text);
    if (selectedFile) fd.append('media', selectedFile);
    if (savedReply) fd.append('replyToMessageId', savedReply.messageId);

    const res  = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages`, {method:'POST', credentials:'include', body: fd});
    const data = await res.json();
    if (!res.ok) showToast(data.error || 'Send failed');
    else {
      // Remove optimistic row; WS will add real one
      document.querySelectorAll('[data-optimistic]').forEach(r => r.remove());
      // If socket not yet delivered, add manually
      if (data.message && !messages[data.message.messageId]) {
        messages[data.message.messageId] = data.message;
        const list = document.getElementById('msgList');
        const typing = document.getElementById('typingBubble');
        list.insertBefore(buildMessageRow(data.message), typing);
        applyConsecutiveClasses(); insertDateSeparators();
        newestId = data.message.messageId;
        scrollToBottom(true);
      }
    }
  } catch { showToast('Network error'); }

  clearMedia();
}

async function sendReaction(msgId, emoji) {
  const msg = messages[msgId]; if (!msg) return;
  if (!msg.reactions) msg.reactions = {};
  const existing = msg.reactions[emoji];
  let uids = Array.isArray(existing) ? [...existing] : (existing?.users ? [...existing.users] : []);
  const idx = uids.indexOf(ME.userId);
  if (idx >= 0) uids.splice(idx, 1); else uids.push(ME.userId);
  msg.reactions[emoji] = { count: uids.length, users: uids };
  refreshReactions(msgId);
  try {
    const res = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages/${msgId}/react`, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({emoji}),
    });
    const data = await res.json();
    if (res.ok && data.reactions) { messages[msgId].reactions = data.reactions; refreshReactions(msgId); }
  } catch {}
}

function refreshReactions(msgId) {

// ── Context menu ──────────────────────────────────────────────────────
const QUICK_EMOJIS = ['❤️','😂','😮','😢','🔥','👍','👎','💜'];

function addContextListeners(row, msg) {
  const isMe = msg.senderId === ME?.userId;
  const show = (e) => {
    e.preventDefault();
    if (msg.deleted) return;
    ctxMsgId = msg.messageId;
    showQuickReact(e, msg.messageId);
    const menu = document.getElementById('ctxMenu');
    document.getElementById('ctxEdit').style.display   = (isMe && msg.type === 'text') ? 'flex' : 'none';
    document.getElementById('ctxDelete').style.display = (isMe || IS_ADMIN || IS_OWNER) ? 'flex' : 'none';
    document.getElementById('ctxPin').style.display    = (IS_ADMIN || IS_OWNER) ? 'flex' : 'none';
    const x = Math.min((e.clientX||e.touches?.[0]?.clientX||100), window.innerWidth - 180);
    const y = Math.min((e.clientY||e.touches?.[0]?.clientY||100), window.innerHeight - 220);
    menu.style.left = x+'px'; menu.style.top = y+'px'; menu.style.display = 'block';
    setTimeout(()=>{
      document.addEventListener('mousedown', outsideClose);
      document.addEventListener('touchstart', outsideClose);
    }, 10);
  };
  row.addEventListener('contextmenu', show);
  let pressTimer;
  row.addEventListener('touchstart', e => { pressTimer = setTimeout(()=>show(e), 500); }, {passive:true});
  row.addEventListener('touchend',  () => clearTimeout(pressTimer), {passive:true});
  row.addEventListener('touchmove', () => clearTimeout(pressTimer), {passive:true});
}

function showQuickReact(e, msgId) {
  const bar = document.getElementById('quickReact');
  bar.innerHTML = '';
  QUICK_EMOJIS.forEach(em => {
    const btn = document.createElement('button'); btn.className = 'qr-btn'; btn.textContent = em;
    btn.onclick = (ev) => { ev.stopPropagation(); sendReaction(msgId, em); closeCtxMenu(); };
    bar.appendChild(btn);
  });
  const x = Math.max(8, Math.min((e.clientX||e.touches?.[0]?.clientX||100) - 120, window.innerWidth - 310));
  const y = Math.max(8, (e.clientY||e.touches?.[0]?.clientY||100) - 60);
  bar.style.left = x+'px'; bar.style.top = y+'px'; bar.style.display = 'flex';
}

function outsideClose(e) {
  const menu = document.getElementById('ctxMenu'), qr = document.getElementById('quickReact');
  if (menu.contains(e.target) || qr.contains(e.target)) return;
  closeCtxMenu();
}
function closeCtxMenu() {
  document.getElementById('ctxMenu').style.display = 'none';
  document.getElementById('quickReact').style.display = 'none';
  ctxMsgId = null;
  document.removeEventListener('mousedown', outsideClose);
  document.removeEventListener('touchstart', outsideClose);
}
function ctxAction(action) {
  const msgId = ctxMsgId; closeCtxMenu(); if (!msgId) return;
  if (action === 'reply') setReply(msgId);
  else if (action === 'copy') {
    const text = messages[msgId]?.content?.text || '';
    navigator.clipboard.writeText(text).then(() => showToast('Copied'));
  }
  else if (action === 'edit') setEdit(msgId);
  else if (action === 'pin') pinMessage(msgId);
  else if (action === 'delete') { if (confirm('Delete this message?')) deleteMessage(msgId); }
}

async function startVoiceRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = []; recSeconds = 0;
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, {type:'audio/webm'});
      const file = new File([blob], 'voice.webm', {type:'audio/webm'});
      clearInterval(recInterval);
      document.getElementById('recordingBar').classList.remove('show');
      mediaRecorder = null; stream.getTracks().forEach(t => t.stop());
      const fd = new FormData(); fd.append('type','voice'); fd.append('media', file);
      try {
        const res = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages`, {method:'POST', credentials:'include', body:fd});
        const d = await res.json();
        if (!res.ok) showToast(d.error || 'Send failed');
      } catch { showToast('Network error'); }
    };
    mediaRecorder.start();
    document.getElementById('recordingBar').classList.add('show');
    recInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds/60), s = recSeconds%60;
      document.getElementById('recTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  } catch { showToast('Cannot access microphone'); mediaRecorder = null; }
}
function stopVoiceRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}
function cancelRecording() {
  if (mediaRecorder) { audioChunks = []; mediaRecorder.stream?.getTracks().forEach(t=>t.stop()); mediaRecorder = null; }
  clearInterval(recInterval);
  document.getElementById('recordingBar').classList.remove('show');
  updateSendBtn();
}

// ── Members list ──────────────────────────────────────────────────────
async function renderMembersList() {
  const members = GROUP.members || [];
  allMembers    = [...members];
  filterMembers();
}

function filterMembers() {
  const q      = document.getElementById('membersSearch').value.toLowerCase();
  const list   = document.getElementById('membersList'); list.innerHTML = '';
  const members = allMembers.filter(m => !m.isBanned || IS_ADMIN || IS_OWNER);
  const filtered = q ? members.filter(m => (m.name||'').toLowerCase().includes(q) || (m.username||'').toLowerCase().includes(q)) : members;

  // Sort: owner first, then admins, then members
  const sorted = [...filtered].sort((a,b) => {
    if (a.isOwner && !b.isOwner) return -1;
    if (!a.isOwner && b.isOwner) return 1;
    if (a.isAdmin && !b.isAdmin) return -1;
    if (!a.isAdmin && b.isAdmin) return 1;
    return (a.name||'').localeCompare(b.name||'');
  });

  if (!sorted.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:24px;font-size:13.5px;">No members found</div>';
    return;
  }

  sorted.forEach(m => list.appendChild(buildMemberRow(m)));
}

function buildMemberRow(m) {
  const item = document.createElement('div'); item.className = 'member-item';
  item.onclick = () => openMemberSheet(m.userId);

async function memberAction(action, targetId) {
  const confirmMessages = {
    promote: 'Promote this member to admin?',
    demote:  'Remove admin rights from this member?',
    ban:     'Ban this member?',
    unban:   'Unban this member?',
    mute:    'Mute this member?',
    unmute:  'Unmute this member?',
  };
  if (!confirm(confirmMessages[action] || `Perform ${action}?`)) return;
  closeMemberSheet();
  try {
    let url, method = 'POST', body = null;
    if (action === 'promote' || action === 'demote' || action === 'ban' || action === 'unban') {
      url = `/api/${GROUP_TYPE}/${GROUP_ID}/members/${targetId}/${action}`;
    } else if (action === 'mute' || action === 'unmute') {
      url = `/api/${GROUP_TYPE}/${GROUP_ID}/members/${targetId}/mute`;
      body = JSON.stringify({ muted: action === 'mute' });
    }
    const opts = { method, credentials:'include' };
    if (body) { opts.headers = {'Content-Type':'application/json'}; opts.body = body; }
    const res = await fetch(url, opts);
    const d   = await res.json();
    if (res.ok) {
      showToast(d.message || 'Done');
      // Update GROUP.members
      const m_ = getMember(targetId);
      if (m_) {
        if (action === 'promote') { m_.isAdmin = true; m_.isBanned = false; }
        if (action === 'demote')  { m_.isAdmin = false; }
        if (action === 'ban')     { m_.isBanned = true; m_.isAdmin = false; }
        if (action === 'unban')   { m_.isBanned = false; }
        if (action === 'mute')    { m_.isMuted = true; }
        if (action === 'unmute')  { m_.isMuted = false; }
      }
      // Sync allMembers with GROUP.members
      allMembers = [...(GROUP.members || [])];
      // Re-render members list if visible
      const sheet = document.getElementById('groupSheet');
      if (sheet && sheet.classList.contains('show') && gsActiveTab === 1) {
        filterMembers();
      }
    } else showToast(d.error || 'Action failed');
  } catch { showToast('Network error'); }
}

async function fetchSearch(q) {
  const el = document.getElementById('searchResults');
  el.innerHTML = '<div class="sr-empty">Searching…</div>';
  try {
    const res  = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages/search?q=${encodeURIComponent(q)}&limit=30`, {credentials:'include'});
    const data = await res.json();
    const msgs = data.messages || [];
    if (!msgs.length) { el.innerHTML = `<div class="sr-empty">No results for "${esc(q)}"</div>`; return; }
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    el.innerHTML = '';
    msgs.forEach(m => {
      const div = document.createElement('div'); div.className = 'search-result-item';
      div.innerHTML = `<div class="sr-sender">${esc(m.senderName||'User')}</div><div class="sr-preview">${m.preview.replace(re, match => `<mark>${esc(match)}</mark>`)}</div><div class="sr-time">${formatDate(new Date(m.sentAt))} · ${formatTime(m.sentAt)}</div>`;
      div.onclick = () => { closeSearch(); scrollToMessage(m.messageId, true); };
      el.appendChild(div);
    });
  } catch { el.innerHTML = '<div class="sr-empty">Search failed</div>'; }
}

// ── Helpers ───────────────────────────────────────────────────────────
function getMember(userId) {
  return (GROUP?.members || []).find(m => m.userId === userId) || null;
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTime(iso) { if (!iso) return ''; return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function formatDate(date) {
  const now = new Date(), today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const d   = new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const diff = (today-d)/86400000;
  if (diff===0) return 'Today'; if (diff===1) return 'Yesterday';
  return date.toLocaleDateString([], {month:'long',day:'numeric',year:diff>365?'numeric':undefined});
}
function timeAgo(iso) {
  const diff = Date.now()-new Date(iso).getTime();
  const m=Math.floor(diff/60000),h=Math.floor(diff/3600000),d=Math.floor(diff/86400000);
  if(m<1)return'just now';if(m<60)return`${m}m ago`;if(h<24)return`${h}h ago`;if(d<7)return`${d}d ago`;
  return new Date(iso).toLocaleDateString();
}
function formatDuration(s) { const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`; }
function formatBytes(b) { if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'; }

let toastTimer;
function goBack() {
  const ref = document.referrer;
  const cur = window.location.href;
  const joinPattern = /\/(join-space|join-feed)\//;
  // If no referrer, referrer is join page, referrer is same page, or referrer is current page
  if (!ref || joinPattern.test(ref) || ref === cur || ref.replace(/\/$/, '') === cur.replace(/\/$/, '')) {
    window.location.href = '/home.html';
  } else {
    window.history.back();
  }
}
