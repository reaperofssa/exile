<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EXILE — Group</title>
<style>
:root {
  --dusk-deep:     #120812;
  --dusk-mid:      #1e0e24;
  --amber:         #c97b3a;
  --amber-light:   #e8a85c;
  --purple-accent: #9b59b6;
  --purple-glow:   rgba(155,89,182,0.3);
  --text-primary:  rgba(255,255,255,0.93);
  --text-sec:      rgba(255,255,255,0.55);
  --text-dim:      rgba(255,255,255,0.3);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --bubble-me:     #4a1a6e;
  --bubble-them:   #1e1428;
  --bubble-me-brd: rgba(155,89,182,0.4);
  --bubble-them-brd: rgba(255,255,255,0.08);
  --error:   rgba(239,68,68,0.9);
  --success: rgba(16,185,129,0.9);
}
body.dark-mode {
  --dusk-deep: #000; --dusk-mid: #0a0a0a;
  --amber: #8b5a2b; --amber-light: #a07038;
  --purple-accent: #7a46a0; --purple-glow: rgba(122,70,160,0.2);
  --text-primary: rgba(255,255,255,0.88); --text-sec: rgba(255,255,255,0.45);
  --text-dim: rgba(255,255,255,0.22);
  --bubble-me: #2d1040; --bubble-them: #111018;
  --bubble-me-brd: rgba(122,70,160,0.3); --bubble-them-brd: rgba(255,255,255,0.06);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;-webkit-text-size-adjust:100%;}
body{height:100%;height:100dvh;font-family:'Segoe UI',system-ui,sans-serif;background:var(--dusk-deep);color:var(--text-primary);display:flex;flex-direction:column;overflow:hidden;transition:background .3s,color .3s;}
.bg-base{position:fixed;inset:0;background:var(--dusk-deep);z-index:-3;}
.bg-glow{position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(155,89,182,0.12) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 85% 80%,rgba(201,123,58,0.08) 0%,transparent 60%);}
.bg-pattern{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;opacity:1;}
.bg-pattern svg{position:absolute;inset:0;width:100%;height:100%;}
.bp-sym{transform-origin:center;animation:bpDrift linear infinite;will-change:transform,opacity;}
@keyframes bpDrift{0%{transform:translateY(0px) rotate(0deg) scale(1);opacity:var(--op-from);}30%{transform:translateY(-8px) rotate(4deg) scale(1.02);opacity:var(--op-to);}60%{transform:translateY(-3px) rotate(-3deg) scale(0.98);opacity:var(--op-mid);}100%{transform:translateY(0px) rotate(0deg) scale(1);opacity:var(--op-from);}}

/* ── Header ── */
.chat-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:0 12px;height:56px;background:linear-gradient(180deg,rgba(18,8,18,0.96) 0%,rgba(18,8,18,0.88) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
.btn-back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:transparent;border:none;color:var(--text-sec);cursor:pointer;transition:background .15s,color .15s;flex-shrink:0;}
.btn-back:hover{background:rgba(255,255,255,0.07);color:var(--text-primary);}
.btn-back svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.group-info-click{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer;border-radius:var(--r-md);padding:4px 6px;margin:-4px -6px;transition:background .15s;}
.group-info-click:hover{background:rgba(255,255,255,0.05);}
.avatar-wrap{position:relative;flex-shrink:0;}
.header-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.12);flex-shrink:0;overflow:hidden;}
.avatar-initials{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purple-accent),var(--amber));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;border:1.5px solid rgba(255,255,255,0.12);flex-shrink:0;}
.header-text{min-width:0;flex:1;}
.header-name{display:flex;align-items:center;gap:5px;font-size:15px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-name .name-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.name-badges{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.premium-badge-small{font-size:9px;font-weight:700;background:linear-gradient(135deg,var(--amber),#a86028);color:#fff;padding:1px 5px;border-radius:4px;letter-spacing:0.3px;}
.header-sub{font-size:11.5px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.typing-sub{color:var(--purple-accent);font-style:italic;}
.header-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.icon-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:transparent;border:none;color:var(--text-sec);cursor:pointer;transition:background .15s,color .15s;}
.icon-btn:hover{background:rgba(255,255,255,0.07);color:var(--text-primary);}
.icon-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Pinned message bar ── */
.pinned-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(155,89,182,0.08);border-bottom:1px solid rgba(155,89,182,0.15);cursor:pointer;flex-shrink:0;transition:background .15s;}
.pinned-bar:hover{background:rgba(155,89,182,0.13);}
.pinned-bar svg{width:13px;height:13px;flex-shrink:0;fill:none;stroke:var(--purple-accent);stroke-width:2;}
.pinned-label{font-size:10.5px;color:var(--purple-accent);font-weight:600;flex-shrink:0;}
.pinned-text{font-size:12px;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}

/* ── Message list ── */
.msg-list{flex:1;overflow-y:auto;padding:12px 0 8px;display:flex;flex-direction:column;}
.msg-list::-webkit-scrollbar{width:3px;}
.msg-list::-webkit-scrollbar-track{background:transparent;}
.msg-list::-webkit-scrollbar-thumb{background:rgba(155,89,182,0.3);border-radius:2px;}
.load-spinner{display:flex;align-items:center;justify-content:center;padding:20px;color:var(--text-dim);font-size:13px;gap:8px;}
.spin{width:16px;height:16px;border:2px solid rgba(155,89,182,0.2);border-top-color:var(--purple-accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.chat-skeleton{display:flex;flex-direction:column;gap:10px;padding:16px 14px;animation:skFadeIn .25s ease;}
@keyframes skFadeIn{from{opacity:0}to{opacity:1}}
.sk-row{display:flex;align-items:flex-end;gap:8px;}
.sk-row.me{flex-direction:row-reverse;}
.sk-avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:rgba(155,89,182,0.12);animation:shimmer 1.4s ease-in-out infinite;}
.sk-bubble{border-radius:16px;height:36px;background:rgba(155,89,182,0.08);animation:shimmer 1.4s ease-in-out infinite;}
.sk-row.them .sk-bubble{border-bottom-left-radius:4px;}
.sk-row.me .sk-bubble{border-bottom-right-radius:4px;background:rgba(155,89,182,0.14);}
@keyframes shimmer{0%,100%{opacity:0.45}50%{opacity:1}}

/* ── Inline formatting ── */
.msg-bold{font-weight:700;}
.msg-italic{font-style:italic;}
.msg-code-inline{font-family:'SF Mono',ui-monospace,monospace;font-size:.875em;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:1px 5px;}
.msg-code-block{display:block;margin:6px 0 2px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;}
.msg-code-lang{display:block;font-family:'SF Mono',ui-monospace,monospace;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--amber-light);padding:5px 10px 4px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.2);}
.msg-code-pre{display:block;font-family:'SF Mono',ui-monospace,monospace;font-size:12.5px;white-space:pre-wrap;word-break:break-all;color:rgba(255,255,255,0.85);padding:8px 10px;margin:0;line-height:1.55;}
.msg-quote{display:block;margin:4px 0 2px;border-left:3px solid var(--amber);background:rgba(201,123,58,0.07);border-radius:0 6px 6px 0;padding:5px 10px;color:var(--text-sec);font-style:italic;font-size:13.5px;}
.msg-link{color:var(--amber-light);text-decoration:none;border-bottom:1px solid rgba(232,168,92,0.35);transition:border-color .15s;}
.msg-link:hover{border-color:var(--amber-light);}
.date-sep{display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text-dim);font-size:11.5px;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}

/* ── Message row ── */
.msg-row{display:flex;align-items:flex-end;gap:6px;padding:1px 12px;animation:msgIn .18s ease;-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-row.me{flex-direction:row-reverse;}
.msg-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--purple-accent),var(--amber));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-end;overflow:hidden;cursor:pointer;}
.msg-row.me .msg-avatar{display:none;}
.msg-row.consecutive .msg-avatar{opacity:0;pointer-events:none;}
.bubble-wrap{display:flex;flex-direction:column;max-width:min(320px,72%);gap:2px;}
.msg-row.me .bubble-wrap{align-items:flex-end;}
.sender-name{font-size:11px;font-weight:600;color:var(--purple-accent);padding:0 4px;margin-bottom:1px;cursor:pointer;display:flex;align-items:center;gap:3px;}
.sender-name:hover{text-decoration:underline;}
.sender-name .sn-badges{display:flex;gap:2px;}
.sn-admin{font-size:9px;background:rgba(155,89,182,0.2);border:1px solid rgba(155,89,182,0.35);color:var(--purple-accent);padding:0 4px;border-radius:3px;font-weight:700;}
.sn-owner{font-size:9px;background:rgba(201,123,58,0.2);border:1px solid rgba(201,123,58,0.35);color:var(--amber-light);padding:0 4px;border-radius:3px;font-weight:700;}
.sn-premium{font-size:9px;color:var(--amber-light);}
.sn-verified{font-size:9px;color:#93c5fd;}
.bubble{padding:8px 11px;border-radius:16px;border:1px solid;word-break:break-word;white-space:pre-wrap;font-size:14.5px;line-height:1.45;position:relative;-webkit-user-select:none;user-select:none;}
.msg-row.them .bubble{background:var(--bubble-them);border-color:var(--bubble-them-brd);border-bottom-left-radius:4px;}
.msg-row.me .bubble{background:var(--bubble-me);border-color:var(--bubble-me-brd);border-bottom-right-radius:4px;}
.msg-row.them.consecutive .bubble{border-top-left-radius:4px;}
.msg-row.me.consecutive .bubble{border-top-right-radius:4px;}
.msg-row.them:not(.consecutive) .bubble::before{content:'';position:absolute;bottom:0;left:-7px;width:14px;height:14px;background:var(--bubble-them);clip-path:polygon(100% 0,100% 100%,0 100%);}
.msg-row.me:not(.consecutive) .bubble::before{content:'';position:absolute;bottom:0;right:-7px;width:14px;height:14px;background:var(--bubble-me);clip-path:polygon(0 0,0 100%,100% 100%);}
.bubble.deleted{background:transparent!important;border:1px dashed rgba(255,255,255,0.12)!important;color:var(--text-dim);font-style:italic;font-size:13px;padding:6px 10px;}

/* ── Reply preview ── */
.reply-preview{display:flex;align-items:stretch;background:rgba(255,255,255,0.07);border-left:3px solid var(--purple-accent);border-radius:6px;margin-bottom:6px;cursor:pointer;overflow:hidden;transition:background .12s;min-width:0;max-height:44px;}
.reply-preview:hover{background:rgba(255,255,255,0.11);}
.reply-body{padding:4px 8px;min-width:0;}
.reply-sender{font-size:11px;font-weight:700;color:var(--purple-accent);margin-bottom:1px;}
.reply-text{font-size:12px;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── Msg meta ── */
.msg-meta{display:flex;align-items:center;gap:4px;padding:0 4px;}
.msg-row.me .msg-meta{justify-content:flex-end;}
.msg-time{font-size:10.5px;color:var(--text-dim);}
.msg-edited{font-size:10px;color:var(--text-dim);font-style:italic;}

/* ── Reactions ── */
.reactions-row{display:flex;flex-wrap:wrap;gap:4px;padding:2px 4px 0;}
.react-pill{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:2px 7px;font-size:12px;cursor:pointer;transition:background .12s;}
.react-pill.mine{background:rgba(155,89,182,0.2);border-color:rgba(155,89,182,0.35);}
.react-pill:hover{background:rgba(255,255,255,0.14);}
.react-count{font-size:11px;color:var(--text-sec);}

/* ── Image/media ── */
.bubble-img{max-width:100%;border-radius:10px;display:block;cursor:pointer;}
.bubble-audio{width:100%;max-width:240px;}
.bubble-sticker{width:100px;height:100px;object-fit:contain;}
.caption-text{margin-top:5px;font-size:13.5px;color:var(--text-primary);}

/* ── Context menu ── */
.ctx-menu{position:fixed;z-index:2000;background:linear-gradient(180deg,#1e1428,#170d20);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r-md);padding:6px 0;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:ctxIn .12s ease;}
@keyframes ctxIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
.ctx-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13.5px;color:var(--text-primary);cursor:pointer;transition:background .1s;}
.ctx-item:hover{background:rgba(255,255,255,0.07);}
.ctx-item svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0;}
.ctx-item.danger{color:#ef4444;}
.ctx-sep{height:1px;background:rgba(255,255,255,0.07);margin:4px 0;}

/* ── Input area ── */
.input-area{display:flex;flex-direction:column;flex-shrink:0;background:linear-gradient(0deg,rgba(18,8,18,0.98),rgba(18,8,18,0.9));border-top:1px solid rgba(255,255,255,0.07);padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom));}
.reply-bar{display:flex;align-items:center;gap:8px;background:rgba(155,89,182,0.08);border:1px solid rgba(155,89,182,0.2);border-radius:var(--r-sm);padding:6px 10px;margin-bottom:6px;animation:slideUp .15s ease;}
.reply-bar-content{flex:1;min-width:0;}
.reply-bar-sender{font-size:11px;font-weight:700;color:var(--purple-accent);}
.reply-bar-preview{font-size:12px;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.reply-bar-close{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:var(--text-sec);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.reply-bar-close svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5;}
.input-row{display:flex;align-items:flex-end;gap:8px;}
.attach-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:transparent;border:none;color:var(--text-sec);cursor:pointer;flex-shrink:0;transition:background .15s;}
.attach-btn:hover{background:rgba(255,255,255,0.07);}
.attach-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.msg-input-wrap{flex:1;position:relative;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;display:flex;align-items:flex-end;overflow:hidden;transition:border-color .2s;}
.msg-input-wrap:focus-within{border-color:rgba(155,89,182,0.5);}
.msg-textarea{flex:1;background:transparent;border:none;outline:none;padding:9px 14px;color:var(--text-primary);font-size:14.5px;font-family:inherit;resize:none;max-height:120px;line-height:1.45;min-height:38px;}
.msg-textarea::placeholder{color:var(--text-dim);}
.send-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purple-accent),#7a3fa0);border:none;color:#fff;cursor:pointer;flex-shrink:0;transition:transform .12s,opacity .15s;}
.send-btn:hover{transform:scale(1.06);}
.send-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.send-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Feed subscriber bar ── */
.feed-sub-bar{display:flex;align-items:center;justify-content:center;padding:12px 20px;background:rgba(155,89,182,0.06);border-top:1px solid rgba(155,89,182,0.1);font-size:13px;color:var(--text-sec);text-align:center;gap:8px;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
.feed-sub-bar svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0;opacity:.6;}

/* ── Jump ── */
.jump-btn{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));right:16px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--purple-accent),#7a3fa0);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(155,89,182,0.4);opacity:0;pointer-events:none;transition:opacity .2s,transform .15s;z-index:50;}
.jump-btn.show{opacity:1;pointer-events:auto;}
.jump-btn:hover{transform:scale(1.08);}
.jump-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.jump-unread-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;padding:0 3px;display:flex;align-items:center;justify-content:center;}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:rgba(30,20,40,0.95);border:1px solid rgba(255,255,255,0.1);padding:9px 16px;border-radius:24px;font-size:13px;color:var(--text-primary);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9999;backdrop-filter:blur(12px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Msg highlight ── */
.msg-row.highlight .bubble{animation:highlightPulse 2s ease forwards;}
@keyframes highlightPulse{0%,100%{background:var(--bubble-them);}25%,75%{background:rgba(155,89,182,0.35);}}
.msg-row.me.highlight .bubble{animation:highlightPulseMe 2s ease forwards;}
@keyframes highlightPulseMe{0%,100%{background:var(--bubble-me);}25%,75%{background:rgba(155,89,182,0.45);}}

/* ══════════════════════════════════════════
   GROUP INFO PANEL (React-style sub-page)
   ══════════════════════════════════════════ */
.group-info-panel{position:fixed;inset:0;z-index:500;background:var(--dusk-deep);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.group-info-panel.open{transform:translateX(0);}
.gip-header{display:flex;align-items:center;gap:10px;padding:0 12px;height:56px;background:linear-gradient(180deg,rgba(18,8,18,0.96),rgba(18,8,18,0.88));backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
.gip-title{flex:1;font-size:16px;font-weight:700;}
.gip-body{flex:1;overflow-y:auto;padding:0 0 40px;}
.gip-body::-webkit-scrollbar{width:3px;}
.gip-body::-webkit-scrollbar-thumb{background:rgba(155,89,182,0.3);border-radius:2px;}
.gip-cover{width:100%;height:140px;background:linear-gradient(135deg,rgba(155,89,182,0.2),rgba(201,123,58,0.15));position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:0 20px 16px;flex-shrink:0;}
.gip-avatar-large{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--dusk-deep);margin-right:14px;flex-shrink:0;}
.gip-avatar-initials{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--purple-accent),var(--amber));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;border:3px solid var(--dusk-deep);flex-shrink:0;}

.gip-section{padding:14px 20px 0;}

.gip-stat-row{display:flex;gap:8px;padding:14px 20px 0;}
.gip-stat{flex:1;text-align:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:var(--r-sm);padding:10px 4px;}

.gip-action-row{display:flex;gap:8px;padding:14px 20px 0;flex-wrap:wrap;}
.gip-btn{flex:1;min-width:120px;padding:10px 12px;border-radius:var(--r-md);font-size:12.5px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s,transform .12s;}

.gip-btn.leave-btn{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);}
.gip-btn.report-btn{background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.2);}
.gip-btn.edit-btn{background:rgba(255,255,255,0.07);color:var(--text-primary);border:1px solid rgba(255,255,255,0.12);}
.gip-btn.delete-btn{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);}

/* Members list */
.members-search-wrap{padding:12px 20px 0;}
.members-search-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:8px 14px;color:var(--text-primary);font-size:14px;outline:none;font-family:inherit;}
.members-search-input:focus{border-color:rgba(155,89,182,0.5);}
.member-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:background .1s;}
.member-item:hover{background:rgba(255,255,255,0.04);}
.member-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--purple-accent),var(--amber));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.member-info{flex:1;min-width:0;}
.member-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.member-username{font-size:12px;color:var(--text-sec);}
.member-badges{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.mbadge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.mbadge.owner{background:rgba(201,123,58,0.2);border:1px solid rgba(201,123,58,0.35);color:var(--amber-light);}
.mbadge.admin{background:rgba(155,89,182,0.2);border:1px solid rgba(155,89,182,0.35);color:var(--purple-accent);}
.mbadge.premium{background:rgba(201,123,58,0.15);border:1px solid rgba(201,123,58,0.25);color:var(--amber-light);}
.mbadge.verified{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);color:#93c5fd;}
.mbadge.muted{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:#fca5a5;}
.mbadge.banned{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2);color:#ef4444;}
.member-action-btn{padding:5px 10px;border-radius:var(--r-sm);font-size:11.5px;font-weight:600;border:none;cursor:pointer;flex-shrink:0;transition:opacity .15s;}
.member-action-btn.promote{background:rgba(155,89,182,0.15);color:var(--purple-accent);border:1px solid rgba(155,89,182,0.25);}
.member-action-btn.demote{background:rgba(251,146,60,0.12);color:#fb923c;border:1px solid rgba(251,146,60,0.2);}
.member-action-btn.ban{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);}
.member-action-btn.unban{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.2);}
.member-action-btn.mute{background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.15);}
.member-action-btn.more{background:rgba(255,255,255,0.06);color:var(--text-sec);border:1px solid rgba(255,255,255,0.1);}

/* ══════════════════════════════════════════
   MEMBER SHEET (click on name/avatar)
   ══════════════════════════════════════════ */
.member-sheet{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);display:none;align-items:flex-end;}
.member-sheet.show{display:flex;}
.ms-inner{width:100%;background:linear-gradient(180deg,#1e1428,#120812);border-top:1px solid rgba(255,255,255,0.1);border-radius:20px 20px 0 0;overflow:hidden;animation:slideUp .2s ease;max-height:90dvh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.ms-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 0;}
.ms-profile{padding:16px 20px 8px;}
.ms-avatar-wrap{display:flex;justify-content:center;margin-bottom:12px;}
.ms-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(155,89,182,0.4);}
.ms-avatar-init{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--purple-accent),var(--amber));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;border:2px solid rgba(155,89,182,0.4);}
.ms-name{text-align:center;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.ms-username{text-align:center;font-size:13px;color:var(--text-sec);margin-bottom:8px;}
.ms-badges-row{display:flex;justify-content:center;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.ms-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text-sec);}
.ms-tag.premium{background:rgba(201,123,58,0.12);border-color:rgba(201,123,58,0.3);color:var(--amber-light);}
.ms-tag.verified{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:#93c5fd;}
.ms-tag.admin{background:rgba(155,89,182,0.12);border-color:rgba(155,89,182,0.3);color:var(--purple-accent);}
.ms-tag.owner{background:rgba(201,123,58,0.15);border-color:rgba(201,123,58,0.35);color:var(--amber-light);}
.ms-stat-row{display:flex;gap:8px;margin-bottom:14px;}
.ms-stat{flex:1;text-align:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r-sm);padding:8px 4px;}
.ms-stat-val{font-size:15px;font-weight:700;}
.ms-stat-lbl{font-size:10px;color:var(--text-dim);margin-top:2px;}
.ms-actions{display:flex;gap:8px;flex-wrap:wrap;padding:0 20px 4px;}
.ms-btn{flex:1;min-width:100px;padding:10px 12px;border-radius:var(--r-md);font-size:12.5px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s,transform .12s;}
.ms-btn:hover{opacity:.85;transform:scale(.98);}
.ms-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;}
.ms-btn.dm{background:rgba(155,89,182,0.15);color:var(--purple-accent);border:1px solid rgba(155,89,182,0.3);}
.ms-btn.promote{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
.ms-btn.demote{background:rgba(251,146,60,0.12);color:#fb923c;border:1px solid rgba(251,146,60,0.25);}
.ms-btn.ban{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);}
.ms-btn.unban{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.2);}
.ms-btn.mute{background:rgba(251,146,60,0.1);color:#fb923c;border:1px solid rgba(251,146,60,0.2);}
.ms-btn.unmute{background:rgba(255,255,255,0.07);color:var(--text-sec);border:1px solid rgba(255,255,255,0.1);}
.ms-btn.kick{background:rgba(239,68,68,0.08);color:#f87171;border:1px solid rgba(239,68,68,0.15);}
.ms-btn.del-msgs{background:rgba(239,68,68,0.06);color:#fca5a5;border:1px solid rgba(239,68,68,0.12);}
.ms-btn.report{background:rgba(251,146,60,0.08);color:#fb923c;border:1px solid rgba(251,146,60,0.15);}
.ms-divider{height:1px;background:rgba(255,255,255,0.07);margin:8px 20px;}
.ms-joined{text-align:center;font-size:11.5px;color:var(--text-dim);padding-bottom:16px;}

/* ══ Join page overlay ══ */
.join-overlay{position:fixed;inset:0;z-index:700;display:flex;align-items:center;justify-content:center;background:var(--dusk-deep);padding:24px;}
.join-card{background:linear-gradient(180deg,#1e1428,#120812);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px 24px;max-width:360px;width:100%;text-align:center;}
.join-card-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(155,89,182,0.4);margin:0 auto 14px;}
.join-card-avatar-init{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--purple-accent),var(--amber));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;border:3px solid rgba(155,89,182,0.4);margin:0 auto 14px;}
.join-card-type{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.join-card-name{font-size:22px;font-weight:800;margin-bottom:6px;word-break:break-word;}
.join-card-bio{font-size:14px;color:var(--text-sec);line-height:1.5;margin-bottom:18px;}
.join-card-stats{display:flex;justify-content:center;gap:24px;margin-bottom:22px;}
.jcs-item{text-align:center;}
.jcs-val{font-size:18px;font-weight:700;}
.jcs-lbl{font-size:11px;color:var(--text-dim);}
.join-btn{width:100%;padding:13px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--purple-accent),#7a3fa0);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:transform .12s,opacity .15s;}
.join-btn:hover{transform:scale(1.02);}
.join-btn:disabled{opacity:.5;cursor:default;transform:none;}
.join-btn.already{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
.join-already-btn{margin-top:10px;width:100%;padding:11px;border-radius:var(--r-md);background:rgba(155,89,182,0.15);color:var(--purple-accent);border:1px solid rgba(155,89,182,0.3);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.join-already-btn:hover{opacity:.85;}
.join-error{color:#ef4444;font-size:13px;margin-top:10px;}

/* ── Search panel ── */
.search-panel{position:fixed;inset:0;z-index:800;background:var(--dusk-deep);display:flex;flex-direction:column;transform:translateY(-100%);transition:transform .2s ease;}
.search-panel.open{transform:translateY(0);}
.search-panel-header{display:flex;align-items:center;gap:10px;padding:8px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);}
.search-panel-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:8px 14px;color:var(--text-primary);font-size:14px;outline:none;font-family:inherit;}
.search-panel-input:focus{border-color:rgba(155,89,182,0.5);}
.search-panel-results{flex:1;overflow-y:auto;padding:12px;}
.sr-item{padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;transition:background .12s;margin-bottom:4px;}
.sr-item:hover{background:rgba(255,255,255,0.05);}
.sr-sender{font-size:12px;font-weight:600;color:var(--purple-accent);margin-bottom:2px;}
.sr-preview{font-size:13.5px;color:var(--text-primary);}
.sr-preview mark{background:rgba(155,89,182,0.35);color:inherit;border-radius:2px;padding:0 1px;}
.sr-time{font-size:11px;color:var(--text-dim);margin-top:2px;}
.sr-empty{text-align:center;color:var(--text-dim);font-size:13.5px;padding:40px 16px;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:linear-gradient(180deg,#1e1428,#120812);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r-lg);padding:24px;width:100%;max-width:360px;animation:ctxIn .15s ease;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px;}
.modal-body{font-size:14px;color:var(--text-sec);line-height:1.5;margin-bottom:18px;}
.modal-actions{display:flex;gap:8px;}
.modal-btn{flex:1;padding:10px;border-radius:var(--r-sm);border:none;font-size:13.5px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.modal-btn:hover{opacity:.85;}
.modal-btn.cancel{background:rgba(255,255,255,0.07);color:var(--text-primary);}
.modal-btn.confirm{background:linear-gradient(135deg,var(--purple-accent),#6a2e9e);color:#fff;}
.modal-btn.danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.25);}
.modal-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r-sm);padding:10px 12px;color:var(--text-primary);font-size:14px;outline:none;font-family:inherit;margin-bottom:10px;}
.modal-input:focus{border-color:rgba(155,89,182,0.5);}

/* ── image lightbox ── */
.lightbox{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;}
.lightbox.show{display:flex;}
.lightbox img{max-width:100%;max-height:100dvh;object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lightbox-close svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;}

#file-input{display:none;}
</style>

<!-- ══ HEADER ══ -->

<div class="input-area" id="inputArea">
  <div class="reply-bar" id="replyBar" style="display:none">

  <div class="ms-inner" id="msInner">
    <div class="ms-handle"></div>
    <div class="ms-profile" id="msProfile"><!-- populated --></div>

<!-- ══ SEARCH PANEL ══ -->
<div class="search-panel" id="searchPanel">
  <div class="search-panel-header">
    <button class="btn-back" onclick="closeSearch()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <input class="search-panel-input" id="searchInput" placeholder="Search messages…" oninput="doSearch()" autocomplete="off">

  <img id="lightboxImg" src="" alt="">

  <div class="join-card" id="joinCard"><!-- populated --></div>

<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

    <div class="modal-title" id="confirmTitle">Confirm</div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="modal-btn danger" id="confirmOkBtn" onclick="doConfirmAction()">Confirm</button>
    </div>
  </div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  EXILE — group.html
//  Handles /space/:spaceId, /feed/:feedId, /join-space/:joinId, /join-feed/:joinId
// ═══════════════════════════════════════════════════════════════

// ── Route detection ────────────────────────────────────────────
const _path       = window.location.pathname;
const _spaceM     = _path.match(/^\/space\/([^/]+)/);
const _feedM      = _path.match(/^\/feed\/([^/]+)/);
const _joinSpaceM = _path.match(/^\/join-space\/([^/]+)/);
const _joinFeedM  = _path.match(/^\/join-feed\/([^/]+)/);

let GROUP_TYPE   = '';  // 'space' | 'feed'
let GROUP_ID     = '';  // spaceId or feedId
let JOIN_ID      = '';  // for join pages
let IS_JOIN_PAGE = false;

if (_spaceM)     { GROUP_TYPE = 'space'; GROUP_ID = _spaceM[1]; }
else if (_feedM) { GROUP_TYPE = 'feed';  GROUP_ID = _feedM[1]; }
else if (_joinSpaceM) { GROUP_TYPE = 'space'; JOIN_ID = _joinSpaceM[1]; IS_JOIN_PAGE = true; }
else if (_joinFeedM)  { GROUP_TYPE = 'feed';  JOIN_ID = _joinFeedM[1];  IS_JOIN_PAGE = true; }

// ── State ──────────────────────────────────────────────────────
let me            = null;   // current user from /api/me
let groupData     = null;   // space or feed doc
let myMember      = null;   // my member entry in the group
let isAdmin       = false;
let isOwner       = false;
let canPost       = false;  // whether I can send messages
let pinnedMessage = null;
let oldestId      = null;
let newestId      = null;
let loadingOlder  = false;
let allLoaded     = false;
let replyTarget   = null;   // { messageId, senderName, preview }
let unreadBelow   = 0;
let ws            = null;
let typingTimer   = null;
let searchDebounce= null;
let ctxTarget     = null;   // for context menu
let memberSheetUser = null; // user shown in member sheet
let confirmCb     = null;   // pending confirm callback

// History stack for back-button handling of the info panel
let infoPanelOpen = false;

// ── Boot ───────────────────────────────────────────────────────
async function init() {
  // Fetch current user
  try {
    const r = await fetch('/api/me', { credentials: 'include' });
    if (!r.ok) { window.location.href = '/login'; return; }
    const d = await r.json();
    me = d.user;
  } catch { window.location.href = '/login'; return; }

  if (IS_JOIN_PAGE) {
    await loadJoinPage();
    return;
  }

  await loadGroup();
  setupSocket();
  setupScrollObserver();
}

// ── Load group data ─────────────────────────────────────────────
async function loadGroup() {
  const col  = GROUP_TYPE === 'space' ? 'spaces' : 'feeds';
  const idP  = GROUP_TYPE === 'space' ? 'spaceId' : 'feedId';
  const url  = `/api/${GROUP_TYPE}s/${GROUP_ID}`;

  const r = await fetch(url, { credentials: 'include' });
  const d = await r.json();

  if (!r.ok || d.banned) {
    showBannedState(d.banReason);
    return;
  }

  groupData = d[GROUP_TYPE === 'space' ? 'space' : 'feed'];
  if (!groupData) { document.getElementById('chatSkeleton').textContent = 'Group not found.'; return; }

  myMember = (groupData.members || []).find(m => m.userId === me.userId) || null;
  isOwner  = groupData.ownerId === me.userId;
  isAdmin  = isOwner || (myMember?.isAdmin === true);
  canPost  = myMember && !myMember.isBanned && !myMember.isMuted &&
             (GROUP_TYPE === 'space' || isAdmin); // feeds: only admins post

  updateHeader();
  updateInputVisibility();
  await loadMessages();
}

function updateHeader() {
  const name = groupData.name || 'Group';
  document.title = `EXILE — ${name}`;
  document.getElementById('headerName').textContent = name;

  const av = document.getElementById('headerAvatar');
  if (groupData.profileImage) {
    const img = document.createElement('img');
    img.src = groupData.profileImage; img.className = 'header-avatar';
    img.onerror = () => { av.textContent = name[0]?.toUpperCase() || '?'; };
    av.replaceWith(img); av.id = 'headerAvatar';
  } else {
    av.textContent = name[0]?.toUpperCase() || '?';
  }

  const badges = document.getElementById('headerBadges');
  badges.innerHTML = '';
  if (groupData.premium) {
    const b = document.createElement('span');
    b.className = 'premium-badge-small'; b.textContent = 'PRO';
    badges.appendChild(b);
  }

  const mc = groupData.memberCount || (groupData.members || []).filter(m => !m.isBanned).length;
  document.getElementById('headerSub').textContent = `${mc} member${mc !== 1 ? 's' : ''} · ${GROUP_TYPE === 'space' ? 'Space' : 'Feed'}`;
}

function updateInputVisibility() {
  const inputArea  = document.getElementById('inputArea');
  const feedSubBar = document.getElementById('feedSubBar');
  if (!myMember) {
    // Not a member — show neither (or show join prompt)
    inputArea.style.display  = 'none';
    feedSubBar.style.display = 'none';
    return;
  }
  if (myMember.isBanned) {
    inputArea.style.display  = 'none';
    feedSubBar.style.display = 'flex';
    document.getElementById('feedSubBar').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> You are banned from this group.`;
    return;
  }
  if (GROUP_TYPE === 'feed' && !isAdmin) {
    inputArea.style.display  = 'none';
    feedSubBar.style.display = 'flex';
    return;
  }
  inputArea.style.display  = 'flex';
  feedSubBar.style.display = 'none';
}

// ── Messages ───────────────────────────────────────────────────
async function loadMessages(before = null) {
  if (loadingOlder && before) return;
  if (allLoaded && before)    return;
  if (before) loadingOlder = true;

  const loader = document.getElementById('topLoader');
  if (before) loader.style.display = 'flex';

  const params = new URLSearchParams({ limit: 40 });
  if (before) params.set('before', before);

  const r = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages?${params}`, { credentials: 'include' });
  const d = await r.json();

  document.getElementById('chatSkeleton').style.display = 'none';
  loader.style.display = 'none';
  loadingOlder = false;

  if (!r.ok) return;

  const msgs = d.messages || [];
  if (msgs.length === 0) { allLoaded = true; return; }
  if (msgs.length < 40)   allLoaded = true;

  pinnedMessage = d.pinnedMessage || null;
  renderPinnedBar();

  const list   = document.getElementById('msgList');
  const typing = document.getElementById('typingRow');

  if (before) {
    // Prepend older messages
    const oldScroll = list.scrollHeight - list.scrollTop;
    const frag = document.createDocumentFragment();
    let   prevDate = null;
    for (const m of msgs) {
      const msgDate = new Date(m.sentAt);
      const dateStr = msgDate.toDateString();
      if (prevDate !== dateStr) {
        frag.appendChild(makeDateSep(msgDate));
        prevDate = dateStr;
      }
      frag.appendChild(buildRow(m, msgs));
    }
    const sentinel = document.getElementById('topSentinel');
    sentinel.after(frag);
    list.scrollTop = list.scrollHeight - oldScroll;
    oldestId = msgs[0].messageId;
  } else {
    // Initial load
    const frag = document.createDocumentFragment();
    let   prevDate = null;
    for (const m of msgs) {
      const msgDate = new Date(m.sentAt);
      const dateStr = msgDate.toDateString();
      if (prevDate !== dateStr) {
        frag.appendChild(makeDateSep(msgDate));
        prevDate = dateStr;
      }
      frag.appendChild(buildRow(m, msgs));
    }
    list.insertBefore(frag, typing);
    oldestId = msgs[0].messageId;
    newestId = msgs[msgs.length - 1].messageId;
    scrollToBottom(false);
  }
}

function makeDateSep(date) {
  const el = document.createElement('div');
  el.className = 'date-sep';
  el.textContent = formatDate(date);
  return el;
}

function buildRow(m, allMsgs) {
  const fromMe = m.senderId === me.userId;
  const idx    = allMsgs ? allMsgs.indexOf(m) : -1;
  const prev   = idx > 0 ? allMsgs[idx - 1] : null;
  const consecutive = prev && prev.senderId === m.senderId &&
    (new Date(m.sentAt) - new Date(prev.sentAt)) < 120000;

  const row = document.createElement('div');
  row.className = `msg-row ${fromMe ? 'me' : 'them'}${consecutive ? ' consecutive' : ''}`;
  row.dataset.msgId = m.messageId;
  row.dataset.sentAt = m.sentAt;

  if (m.deleted) {
    const bw = document.createElement('div');
    bw.className = 'bubble-wrap';
    const bubble = document.createElement('div');
    bubble.className = 'bubble deleted';
    bubble.textContent = '🚫 Message was deleted';
    bw.appendChild(bubble);
    row.appendChild(bw);
    return row;
  }

  // Avatar
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  if (!fromMe) {
    if (m.senderAvatar) {
      const img = document.createElement('img');
      img.src = m.senderAvatar; img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      img.onerror = () => { av.textContent = (m.senderName||'?')[0].toUpperCase(); };
      av.appendChild(img);
    } else {
      av.textContent = (m.senderName||'?')[0].toUpperCase();
    }
    av.onclick = (e) => { e.stopPropagation(); openMemberSheet(m.senderId); };
  }
  row.appendChild(av);

  const bw = document.createElement('div');
  bw.className = 'bubble-wrap';

  // Sender name row (not me, not consecutive)
  if (!fromMe && !consecutive) {
    const sn = document.createElement('div');
    sn.className = 'sender-name';
    sn.innerHTML = escHtml(m.senderName || m.senderUsername || '');
    sn.onclick = (e) => { e.stopPropagation(); openMemberSheet(m.senderId); };
    // Add badges
    const mem = (groupData?.members || []).find(x => x.userId === m.senderId);
    if (mem || m.senderPosition) {
      const pos = m.senderPosition || (mem?.isOwner ? 'owner' : mem?.isAdmin ? 'admin' : '');
      const snb = document.createElement('span');
      snb.className = 'sn-badges';
      if (pos === 'owner') snb.innerHTML += '<span class="sn-owner">owner</span>';
      else if (pos === 'admin') snb.innerHTML += '<span class="sn-admin">admin</span>';
      if (m.senderPremium) snb.innerHTML += '<span class="sn-premium">⭐</span>';
      if (m.senderVerified) snb.innerHTML += '<span class="sn-verified">✓</span>';
      if (snb.innerHTML) sn.appendChild(snb);
    }
    bw.appendChild(sn);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Reply preview
  if (m.replyTo) {
    const rp = document.createElement('div');
    rp.className = 'reply-preview';
    rp.innerHTML = `<div class="reply-body"><div class="reply-sender">${escHtml(m.replyTo.senderName||'')}</div><div class="reply-text">${escHtml(m.replyTo.preview||'')}</div></div>`;
    rp.onclick = (e) => { e.stopPropagation(); scrollToMsg(m.replyTo.messageId); };
    bubble.appendChild(rp);
  }

  // Content
  const ct = buildMsgContent(m);
  bubble.appendChild(ct);

  // Meta (time, edited)
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  if (m.editedAt) {
    const ed = document.createElement('span');
    ed.className = 'msg-edited'; ed.textContent = 'edited';
    meta.appendChild(ed);
  }
  const tm = document.createElement('span');
  tm.className = 'msg-time'; tm.textContent = formatTime(m.sentAt);
  meta.appendChild(tm);
  bubble.appendChild(meta);

  bw.appendChild(bubble);

  // Reactions
  if (m.reactions && Object.keys(m.reactions).length > 0) {
    const rr = document.createElement('div');
    rr.className = 'reactions-row';
    for (const [emoji, info] of Object.entries(m.reactions)) {
      const uids  = Array.isArray(info) ? info : (info.users || []);
      const count = Array.isArray(info) ? info.length : (info.count || 0);
      if (count === 0) continue;
      const pill = document.createElement('div');
      pill.className = `react-pill${uids.includes(me.userId) ? ' mine' : ''}`;
      pill.innerHTML = `${emoji}<span class="react-count">${count}</span>`;
      pill.onclick = (e) => { e.stopPropagation(); reactToMsg(m.messageId, emoji); };
      rr.appendChild(pill);
    }
    bw.appendChild(rr);
  }

  row.appendChild(bw);

  // Long-press / right-click context
  row.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e, m); });
  let pressTimer;
  row.addEventListener('touchstart', () => { pressTimer = setTimeout(() => showCtxMenu(null, m), 600); }, { passive: true });
  row.addEventListener('touchend', () => clearTimeout(pressTimer));
  row.addEventListener('touchmove', () => clearTimeout(pressTimer));

  return row;
}

function buildMsgContent(m) {
  const wrap = document.createElement('div');
  switch (m.type) {
    case 'text': {
      renderRichText(m.content?.text || '', wrap);
      break;
    }
    case 'image': {
      const img = document.createElement('img');
      img.src = m.content?.mediaUrl || ''; img.className = 'bubble-img';
      img.onclick = () => openLightbox(m.content?.mediaUrl);
      img.onerror = () => { wrap.textContent = '[Image]'; };
      wrap.appendChild(img);
      break;
    }
    case 'image_caption': {
      const img = document.createElement('img');
      img.src = m.content?.mediaUrl || ''; img.className = 'bubble-img';
      img.onclick = () => openLightbox(m.content?.mediaUrl);
      wrap.appendChild(img);
      if (m.content?.caption) {
        const cap = document.createElement('div');
        cap.className = 'caption-text';
        renderRichText(m.content.caption, cap);
        wrap.appendChild(cap);
      }
      break;
    }
    case 'sticker': {
      const img = document.createElement('img');
      img.src = m.content?.mediaUrl || ''; img.className = 'bubble-sticker';
      img.onerror = () => { wrap.textContent = '[Sticker]'; };
      wrap.appendChild(img);
      break;
    }
    case 'audio':
    case 'voice': {
      const audio = document.createElement('audio');
      audio.src = m.content?.mediaUrl || '';
      audio.controls = true; audio.className = 'bubble-audio';
      wrap.appendChild(audio);
      break;
    }
    default:
      wrap.textContent = `[${m.type}]`;
  }
  return wrap;
}

// ── Socket.IO ──────────────────────────────────────────────────
function setupSocket() {
  ws = io('/', { withCredentials: true, transports: ['websocket', 'polling'] });

  ws.on('connect', () => {
    ws.emit('joinGroup', { groupId: GROUP_ID, groupType: GROUP_TYPE });
  });

  ws.on('message', (data) => {
    switch (data.type) {
      case 'newGroupMessage':
        if (data.groupId === GROUP_ID || data.message?.groupId === GROUP_ID) {
          handleNewMessage(data.message);
        }
        break;
      case 'groupMessageDeleted':
        if (data.groupId === GROUP_ID) handleMsgDeleted(data.messageId);
        break;
      case 'groupMessageEdited':
        if (data.groupId === GROUP_ID) handleMsgEdited(data);
        break;
      case 'groupMessageReaction':
        if (data.groupId === GROUP_ID) handleReaction(data);
        break;
      case 'groupTyping':
        if (data.groupId === GROUP_ID) handleTyping(data);
        break;
      case 'memberJoined':
        if (data.spaceId === GROUP_ID || data.feedId === GROUP_ID) handleMemberJoined(data.member);
        break;
      case 'memberLeft':
        if (data.spaceId === GROUP_ID || data.feedId === GROUP_ID) handleMemberLeft(data.userId);
        break;
      case 'memberBanned':
      case 'memberMuted':
      case 'memberPromoted':
      case 'memberDemoted':
        if (data.groupId === GROUP_ID) reloadGroupSilent();
        break;
      case 'messagePinned':
        if (data.groupId === GROUP_ID) handlePinnedUpdate(data.messageId);
        break;
      case 'groupUpdated':
        if (data.spaceId === GROUP_ID || data.feedId === GROUP_ID || data.groupId === GROUP_ID) {
          if (groupData) { Object.assign(groupData, data.updates); updateHeader(); }
        }
        break;
      case 'groupDeleted':
        showToast('This group has been deleted.');
        setTimeout(() => history.back(), 2000);
        break;
      case 'allUserMessagesDeleted':
        if (data.groupId === GROUP_ID) {
          document.querySelectorAll('.msg-row').forEach(r => {
            if (r.dataset.senderId === data.userId) {
              r.querySelector('.bubble')?.classList.add('deleted');
              const ct = r.querySelector('.bubble div');
              if (ct) ct.textContent = '🚫 Message was deleted';
            }
          });
        }
        break;
    }
  });
}

function handleNewMessage(m) {
  if (!m || m.deleted) return;
  const list   = document.getElementById('msgList');
  const typing = document.getElementById('typingRow');
  const existing = document.querySelector(`[data-msg-id="${m.messageId}"]`);
  if (existing) return;

  // Date separator?
  const msgDate  = new Date(m.sentAt);
  const dateStr  = msgDate.toDateString();
  const lastRow  = [...list.querySelectorAll('.msg-row')].pop();
  const lastDate = lastRow ? new Date(lastRow.dataset.sentAt).toDateString() : null;
  if (lastDate !== dateStr) {
    list.insertBefore(makeDateSep(msgDate), typing);
  }

  const row = buildRow(m, null);
  list.insertBefore(row, typing);
  newestId = m.messageId;

  const atBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 100;
  if (atBottom) {
    scrollToBottom(true);
  } else if (m.senderId !== me.userId) {
    unreadBelow++;
    updateJumpBadge();
  }
}

function handleMsgDeleted(messageId) {
  const row = document.querySelector(`[data-msg-id="${messageId}"]`);
  if (!row) return;
  const bubble = row.querySelector('.bubble');
  if (bubble) { bubble.className = 'bubble deleted'; bubble.innerHTML = '🚫 Message was deleted'; }
}
function handleMsgEdited(data) {
  const row = document.querySelector(`[data-msg-id="${data.messageId}"]`);
  if (!row) return;
  const bubble = row.querySelector('.bubble');
  if (!bubble || bubble.classList.contains('deleted')) return;
  // Update text content area (first div child that's not reply-preview or msg-meta)
  const ct = bubble.querySelector('div:not(.reply-preview):not(.msg-meta)');
  if (ct) { ct.innerHTML = ''; renderRichText(data.text || '', ct); }
  if (!row.querySelector('.msg-edited')) {
    const meta = bubble.querySelector('.msg-meta');
    if (meta) { const ed = document.createElement('span'); ed.className = 'msg-edited'; ed.textContent = 'edited'; meta.prepend(ed); }
  }
}
function handleReaction(data) {
  const row = document.querySelector(`[data-msg-id="${data.messageId}"]`);
  if (!row) return;
  const bw  = row.querySelector('.bubble-wrap');
  let   rr  = bw?.querySelector('.reactions-row');
  if (!rr)  { rr = document.createElement('div'); rr.className = 'reactions-row'; bw?.appendChild(rr); }
  rr.innerHTML = '';
  for (const [emoji, info] of Object.entries(data.reactions || {})) {
    const uids  = info.users || [];
    const count = info.count || 0;
    if (count === 0) continue;
    const pill = document.createElement('div');
    pill.className = `react-pill${uids.includes(me.userId) ? ' mine' : ''}`;

// ── Send message ───────────────────────────────────────────────
async function sendMessage() {
  const ta   = document.getElementById('msgTextarea');
  const text = ta.value.replace(/^\s+|\s+$/g, '');
  if (!text && !window._pendingFile) return;
  if (!canPost) return;

  const formData = new FormData();
  formData.append('type', window._pendingFile ? (window._pendingFileType || 'image') : 'text');
  if (text) formData.append(window._pendingFile ? 'caption' : 'text', text);
  if (window._pendingFile) formData.append('media', window._pendingFile);
  if (replyTarget) formData.append('replyToMessageId', replyTarget.messageId);

  ta.value = '';
  autoResize(ta);
  cancelReply();
  window._pendingFile = null;
  window._pendingFileType = null;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  try {
    const r = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages`, {
      method: 'POST', credentials: 'include', body: formData,
    });
    const d = await r.json();
    if (r.ok && d.message) handleNewMessage(d.message);
    else if (!r.ok) showToast(d.error || 'Failed to send.');
  } catch { showToast('Network error.'); }
  btn.disabled = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── File select ────────────────────────────────────────────────
function handleFileSelect(input) {
  const file = input.files?.[0];
  if (!file) return;
  window._pendingFile = file;
  window._pendingFileType = file.type.startsWith('audio') ? 'audio' : 'image';
  document.getElementById('msgTextarea').placeholder = `${file.name} — add a caption or just send`;
  input.value = '';
}

// ── Typing ─────────────────────────────────────────────────────
function onTyping() {
  if (!ws || !canPost) return;
  ws.emit('groupTyping', { groupId: GROUP_ID, groupType: GROUP_TYPE });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    ws.emit('groupStopTyping', { groupId: GROUP_ID });
  }, 2500);
}

// ── Scroll ─────────────────────────────────────────────────────
function scrollToBottom(smooth) {
  const list = document.getElementById('msgList');
  list.scrollTo({ top: list.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
  unreadBelow = 0;
  updateJumpBadge();
}
function scrollToMsg(messageId) {
  const el = document.querySelector(`[data-msg-id="${messageId}"]`);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.add('highlight');
  setTimeout(() => el.classList.remove('highlight'), 2200);
}
function setupScrollObserver() {
  const list = document.getElementById('msgList');
  list.addEventListener('scroll', () => {
    const atBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 80;
    const jumpBtn  = document.getElementById('jumpBtn');
    jumpBtn.classList.toggle('show', !atBottom);
    if (atBottom) { unreadBelow = 0; updateJumpBadge(); }
    if (list.scrollTop < 120 && !loadingOlder && !allLoaded && oldestId) {
      loadMessages(oldestId);
    }
  });
}
function updateJumpBadge() {
  const badge = document.getElementById('jumpBadge');
  if (unreadBelow > 0) { badge.style.display = 'flex'; badge.textContent = unreadBelow > 99 ? '99+' : unreadBelow; }
  else badge.style.display = 'none';
}

  }
  if (m.type === 'text' && !m.deleted) {
    addItem('<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>', 'Copy', '', () => { navigator.clipboard?.writeText(m.content?.text || ''); showToast('Copied'); });
  }

  if (e) {

    m.name?.toLowerCase().includes(q) || m.username?.toLowerCase().includes(q)
  ) : members;
  renderMembersList(filtered);
}

function renderMembersList(members) {
  const el = document.getElementById('membersList');
  if (!el) return;

  // Sort: owner first, then admins, then members
  const sorted = [...members].sort((a, b) => {
    if (a.isOwner) return -1; if (b.isOwner) return 1;
    if (a.isAdmin && !b.isAdmin) return -1; if (b.isAdmin && !a.isAdmin) return 1;
    return (a.name || '').localeCompare(b.name || '');
  });
  for (const m of sorted) {
    el.appendChild(makeMemberItem(m));
  }
}

async function memberAction(action, targetId) {
  document.getElementById('memberSheet').classList.remove('show');
  const col = GROUP_TYPE;

  switch (action) {
    case 'promote':
      showConfirm('Promote to Admin?', 'This user will be able to manage the group.', async () => {
        const r = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/promote`, { method: 'POST', credentials: 'include' });
        if (r.ok) { showToast('Promoted!'); await reloadGroupSilent(); } else { const d = await r.json(); showToast(d.error || 'Failed'); }
      });
      break;
    case 'demote':
      showConfirm('Demote Admin?', 'They will lose admin rights.', async () => {
        const r = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/demote`, { method: 'POST', credentials: 'include' });
        if (r.ok) { showToast('Demoted.'); await reloadGroupSilent(); } else { const d = await r.json(); showToast(d.error || 'Failed'); }
      });
      break;
    case 'mute':
      showConfirm('Mute member?', 'They will not be able to send messages.', async () => {
        const r = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/mute`, { method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ muted: true }) });
        if (r.ok) { showToast('Muted.'); await reloadGroupSilent(); } else { const d = await r.json(); showToast(d.error || 'Failed'); }
      });
      break;
    case 'unmute':
      showConfirm('Unmute member?', '', async () => {
        const r = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/mute`, { method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ muted: false }) });
        if (r.ok) { showToast('Unmuted.'); await reloadGroupSilent(); } else { const d = await r.json(); showToast(d.error || 'Failed'); }
      });
      break;
    case 'ban':
      showConfirm('Ban member?', 'They will not be able to access this group.', async () => {
        const r = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/ban`, { method: 'POST', credentials: 'include' });
        if (r.ok) { showToast('Banned.'); await reloadGroupSilent(); } else { const d = await r.json(); showToast(d.error || 'Failed'); }
      });
      break;
    case 'unban':
      showConfirm('Unban member?', 'They will be able to access the group again.', async () => {
        const r = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/unban`, { method: 'POST', credentials: 'include' });
        if (r.ok) { showToast('Unbanned.'); await reloadGroupSilent(); } else { const d = await r.json(); showToast(d.error || 'Failed'); }
      });
      break;
    case 'kick': {
      const leaveUrl = GROUP_TYPE === 'space' ? `/api/spaces/${GROUP_ID}/leave` : `/api/feeds/${GROUP_ID}/leave`;
      showConfirm('Kick member?', 'They will be removed from the group but can rejoin with the link.', async () => {
        // Kick = ban + unban (remove from group). Backend doesn't have a dedicated kick so we use ban then unban
        const r1 = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/ban`, { method: 'POST', credentials: 'include' });
        if (r1.ok) { showToast('Member kicked.'); await reloadGroupSilent(); }
        else { const d = await r1.json(); showToast(d.error || 'Failed'); }
      });
      break;
    }
    case 'deletemsgs':
      showConfirm('Delete all messages?', 'All messages from this user in this group will be deleted.', async () => {
        const r = await fetch(`/api/${col}/${GROUP_ID}/members/${targetId}/messages`, { method: 'DELETE', credentials: 'include' });
        if (r.ok) showToast('Messages deleted.');
        else { const d = await r.json(); showToast(d.error || 'Failed'); }
      });
      break;
    case 'report':
      showToast('Report submitted.'); // simplified
      break;
  }
}

function openSearch() {

}
function closeSearch() {
  document.getElementById('searchPanel').classList.remove('open');

}
function doSearch() {
  clearTimeout(searchDebounce);
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
  searchDebounce = setTimeout(async () => {
    const r = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages/search?q=${encodeURIComponent(q)}&limit=30`, { credentials: 'include' });
    const d = await r.json();
    const res = document.getElementById('searchResults');
    res.innerHTML = '';
    const msgs = d.messages || [];
    if (msgs.length === 0) { res.innerHTML = `<div class="sr-empty">No results for "${escHtml(q)}"</div>`; return; }
    for (const m of msgs) {
      const item = document.createElement('div');
      item.className = 'sr-item';
      const highlighted = escHtml(m.preview || '').replace(new RegExp(escRegex(q), 'gi'), s => `<mark>${s}</mark>`);
      item.innerHTML = `<div class="sr-sender">${escHtml(m.senderName || '')}</div><div class="sr-preview">${highlighted}</div><div class="sr-time">${timeAgo(m.sentAt)}</div>`;
      item.onclick = () => {
        closeSearch();
        scrollToMsg(m.messageId);
        if (!document.querySelector(`[data-msg-id="${m.messageId}"]`)) {
          // Message not loaded — reload around that message
          loadMessages();
        }
      };
      res.appendChild(item);
    }
  }, 300);
}

  const url = GROUP_TYPE === 'space'
    ? `/api/spaces/join/${JOIN_ID}`

  // Peek at the group — attempt a preview fetch (not joining yet)

  const card = document.getElementById('joinCard');

  const card = document.getElementById('joinCard');
  const name = group?.name || (GROUP_TYPE === 'space' ? 'Space' : 'Feed');

  if (group?.profileImage) {

  } else {
    avatarHtml = `<div class="join-card-avatar-init">${(name[0]||'G').toUpperCase()}</div>`;
  }

  card.innerHTML = `
    ${avatarHtml}
    <div class="join-card-type">${GROUP_TYPE === 'space' ? '💬 Space' : '📢 Feed'}</div>
    <div class="join-card-name">${escHtml(name)}</div>

    <div class="join-card-stats">

async function doJoin(joinId) {
  const btn = document.getElementById('joinBtn');
  if (btn) btn.disabled = true;
  const url = GROUP_TYPE === 'space' ? `/api/spaces/join/${joinId}` : `/api/feeds/join/${joinId}`;
  const r = await fetch(url, { method: 'POST', credentials: 'include' });
  const d = await r.json();
  if (r.ok) {
    const groupId = d.spaceId || d.feedId;
    const dest = GROUP_TYPE === 'space' ? `/space/${groupId}` : `/feed/${groupId}`;
    window.location.href = dest;
  } else if (d.error === 'Already a member.') {
    // Redirect to group
    // We need the groupId — try to find it
    if (btn) { btn.textContent = 'Open Group'; btn.className = 'join-btn already'; btn.onclick = null; btn.disabled = false; }
    document.getElementById('joinError').textContent = d.error;
  } else {
    document.getElementById('joinError').textContent = d.error || 'Failed to join.';
    if (btn) btn.disabled = false;
  }
}

// ── Helpers ────────────────────────────────────────────────────
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function formatTime(iso) { if (!iso) return ''; return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function formatDate(date) {
  const now = new Date(), today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = (today - d) / 86400000;
  if (diff === 0) return 'Today'; if (diff === 1) return 'Yesterday';
  return date.toLocaleDateString([], { month: 'long', day: 'numeric', year: diff > 365 ? 'numeric' : undefined });
}
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), d = Math.floor(diff / 86400000);
  if (m < 1) return 'just now'; if (m < 60) return `${m}m ago`; if (h < 24) return `${h}h ago`;
  if (d < 7) return `${d}d ago`; return new Date(iso).toLocaleDateString();
}

// ── Rich text renderer (from chat.html) ───────────────────────
function renderRichText(text, root) {
  const parts = parseCodeBlocks(text);
  for (const part of parts) {
    if (part.type === 'code') {
      const block = document.createElement('div');
      block.className = 'msg-code-block';
      if (part.lang) { const l = document.createElement('span'); l.className = 'msg-code-lang'; l.textContent = part.lang; block.appendChild(l); }
      const pre = document.createElement('pre'); pre.className = 'msg-code-pre'; pre.textContent = part.src; block.appendChild(pre);
      root.appendChild(block);
    } else {
      const lines = part.src.split('\n');
      for (let li = 0; li < lines.length; li++) { if (li > 0) root.appendChild(document.createTextNode('\n')); renderInline(lines[li], root); }
    }
  }
}
function parseCodeBlocks(text) {
  const parts = []; let last = 0;
  const re = /```([a-zA-Z0-9]*)\n?([\s\S]*?)```/g; let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ type: 'text', src: text.slice(last, m.index) });
    parts.push({ type: 'code', lang: m[1] || '', src: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ type: 'text', src: text.slice(last) });
  return parts;
}
function renderInline(str, parent) {
  if (!str) return;
  const fc = str.trimStart()[0];
  if (fc === '"' || fc === '\u201C' || fc === '\u201E') {
    let inner = str.trimStart().slice(1);
    if (inner.endsWith('"') || inner.endsWith('\u201D')) inner = inner.slice(0, -1);
    const q = document.createElement('span'); q.className = 'msg-quote'; q.textContent = inner.trim(); parent.appendChild(q); return;
  }
  const RE = /(https?:\/\/[^\s<>"'`*_]+)|(\*([^*]{1,300})\*)|(_((?!\s)[^_]{1,300}(?<!\s))_)|(`([^`]{1,300})`)|([*_`])/g;
  let last = 0, m2;
  while ((m2 = RE.exec(str)) !== null) {
    if (m2.index > last) parent.appendChild(document.createTextNode(str.slice(last, m2.index)));
    last = m2.index + m2[0].length;
    if (m2[1]) { const a = document.createElement('a'); a.href = m2[1]; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.className = 'msg-link'; a.textContent = m2[1]; a.addEventListener('click', e => e.stopPropagation()); parent.appendChild(a); }
    else if (m2[2]) { const b = document.createElement('strong'); b.className = 'msg-bold'; b.textContent = m2[3]; parent.appendChild(b); }
    else if (m2[4]) { const em = document.createElement('em'); em.className = 'msg-italic'; em.textContent = m2[5]; parent.appendChild(em); }
    else if (m2[6]) { const code = document.createElement('code'); code.className = 'msg-code-inline'; code.textContent = m2[7]; parent.appendChild(code); }
    else parent.appendChild(document.createTextNode(m2[8]));
  }
  if (last < str.length) parent.appendChild(document.createTextNode(str.slice(last)));
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2700);
}

// Background refresh
let bgTimer = null;
document.addEventListener('visibilitychange', () => {
  if (document.hidden || IS_JOIN_PAGE) return;
  if (ws && !ws.connected) ws.connect();
  clearTimeout(bgTimer);
  bgTimer = setTimeout(async () => {
    if (!newestId || !GROUP_ID) return;
    try {
      const r  = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages?after=${newestId}&limit=50`, { credentials: 'include' });
      if (!r.ok) return;
      const d  = await r.json();
      const msgs = d.messages || [];
      if (msgs.length === 0) return;
      const list = document.getElementById('msgList');
      const typing = document.getElementById('typingRow');
      for (const m of msgs) {
        if (document.querySelector(`[data-msg-id="${m.messageId}"]`)) continue;
        list.insertBefore(buildRow(m, null), typing);
      }
      newestId = msgs[msgs.length - 1].messageId;
      const atBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 80;
      if (atBottom) scrollToBottom(true);
      else { unreadBelow += msgs.length; updateJumpBadge(); }
    } catch {}
  }, 300);
});
