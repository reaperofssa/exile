// ── Text formatter (ported from chat.html exactly) ────────────────────
function makeTextContent(text) {
  const root = document.createElement('div');
  root.style.cssText = 'white-space:pre-wrap;word-break:break-word;';
  if (!text) return root;
  const parts = [];
  let pos = 0;
  while (pos < text.length) {
    const fence = text.indexOf('```', pos);
    if (fence === -1) { parts.push({type:'text', src: text.slice(pos)}); break; }
    if (fence > pos) parts.push({type:'text', src: text.slice(pos, fence)});
    const nl = text.indexOf('\n', fence+3);
    if (nl === -1) { parts.push({type:'text', src: text.slice(fence)}); break; }
    const lang = text.slice(fence+3, nl).trim();
    const closeSearch = nl+1;
    const close = text.indexOf('\n```', closeSearch);
    if (close === -1) { parts.push({type:'text', src: text.slice(fence)}); break; }
    const code = text.slice(nl+1, close);
    parts.push({type:'code', lang, src: code});
    pos = close+4;
    if (text[pos] === '\n') pos++;
  }
  for (const part of parts) {
    if (part.type === 'code') {
      const block = document.createElement('div'); block.className = 'msg-code-block';
      if (part.lang) { const lbl=document.createElement('span');lbl.className='msg-code-lang';lbl.textContent=part.lang;block.appendChild(lbl); }
      const pre = document.createElement('pre'); pre.className = 'msg-code-pre'; pre.textContent = part.src;
      block.appendChild(pre); root.appendChild(block);
    } else {
      const lines = part.src.split('\n');
      for (let li=0;li<lines.length;li++) { if(li>0) root.appendChild(document.createTextNode('\n')); renderInline(lines[li], root); }
    }
  }
  return root;
}
function renderInline(str, parent) {
  if (!str) return;
  const fc = str.trimStart()[0];
  if (fc==='"'||fc==='\u201C'||fc==='\u201E') {
    let inner=str.trimStart().slice(1);
    if(inner.endsWith('"')||inner.endsWith('\u201D'))inner=inner.slice(0,-1);
    const q=document.createElement('span');q.className='msg-quote';q.textContent=inner.trim();parent.appendChild(q);return;
  }
  const RE=/(https?:\/\/[^\s<>"'`*_]+)|(\*([^*]{1,300})\*)|(_((?!\s)[^_]{1,300}(?<!\s))_)|(`([^`]{1,300})`)|([*_`])/g;
  let last=0,m;
  while((m=RE.exec(str))!==null){
    if(m.index>last)parent.appendChild(document.createTextNode(str.slice(last,m.index)));
    last=m.index+m[0].length;
    if(m[1]){const a=document.createElement('a');a.href=m[1];a.target='_blank';a.rel='noopener noreferrer';a.className='msg-link';a.textContent=m[1];a.addEventListener('click',e=>e.stopPropagation());parent.appendChild(a);}
    else if(m[2]){const b=document.createElement('strong');b.className='msg-bold';b.textContent=m[3];parent.appendChild(b);}
    else if(m[4]){const em=document.createElement('em');em.className='msg-italic';em.textContent=m[5];parent.appendChild(em);}
    else if(m[6]){const code=document.createElement('code');code.className='msg-code-inline';code.textContent=m[7];parent.appendChild(code);}
    else{parent.appendChild(document.createTextNode(m[8]));}
  }
  if(last<str.length)parent.appendChild(document.createTextNode(str.slice(last)));
}

// ── Background refresh on tab visibility ─────────────────────────────
let bgRefreshTimer = null;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  if (ws && !ws.connected) ws.connect();
  clearTimeout(bgRefreshTimer);
  bgRefreshTimer = setTimeout(async () => {
    if (!newestId || !GROUP_ID) return;
    try {
      const res = await fetch(`/api/${GROUP_TYPE}/${GROUP_ID}/messages?after=${newestId}&limit=50`, {credentials:'include'});
      if (!res.ok) return;
      const data = await res.json();
      const msgs = data.messages || [];
      if (!msgs.length) return;
      const list   = document.getElementById('msgList');
      const typing = document.getElementById('typingBubble');
      let added = 0;
      for (const m of msgs) {
        if (document.querySelector(`[data-msg-id="${m.messageId}"]`)) continue;
        messages[m.messageId] = m;
        list.insertBefore(buildMessageRow(m), typing);
        added++;
      }
      if (added > 0) {
        newestId = msgs[msgs.length-1].messageId;
        applyConsecutiveClasses(); insertDateSeparators();
        const ab = list.scrollHeight - list.scrollTop - list.clientHeight < 80;
        if (ab) { scrollToBottom(true); ws?.emit('groupRead',{groupId:GROUP_ID,upToMessageId:newestId}); }
        else { unreadBelowCount+=added; updateJumpBadge(); }
      }
    } catch {}
  }, 300);
});
window.addEventListener('online', () => { if (ws && !ws.connected) ws.connect(); });
window.addEventListener('focus', () => {
  if (!document.hidden) {
    clearTimeout(bgRefreshTimer);
    bgRefreshTimer = setTimeout(async () => {
      if (!newestId || !GROUP_ID) return;
      // same logic as visibilitychange
    }, 400);
  }
});
