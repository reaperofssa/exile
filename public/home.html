<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXILE — Chats</title>
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --dusk-deep:     #120812;
  --dusk-mid:      #1e0e24;
  --amber:         #c97b3a;
  --amber-light:   #e8a85c;
  --purple-accent: #9b59b6;
  --purple-glow:   rgba(155,89,182,0.3);
  --text-primary:  rgba(255,255,255,0.93);
  --text-sec:      rgba(255,255,255,0.55);
  --text-dim:      rgba(255,255,255,0.3);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --tab-h: 68px;
  --header-h: 48px;
}

body.dark-mode {
  --dusk-deep:     #000000;
  --dusk-mid:      #0a0a0a;
  --amber:         #8b5a2b;
  --amber-light:   #a07038;
  --purple-accent: #7a46a0;
  --purple-glow:   rgba(122,70,160,0.2);
  --text-primary:  rgba(255,255,255,0.88);
  --text-sec:      rgba(255,255,255,0.45);
  --text-dim:      rgba(255,255,255,0.22);
}
body.dark-mode .bg-base { background: #000 !important; }
body.dark-mode .bg-glow { opacity: 0.15; }
body.dark-mode .glass {
  background: linear-gradient(180deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.018) 18%, rgba(255,255,255,0.012) 80%, rgba(255,255,255,0.03) 100%) !important;
  border-color: rgba(255,255,255,0.07) !important;
  border-top-color: rgba(255,255,255,0.11) !important;
}
body.dark-mode .site-header {
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.65) 100%) !important;
  border-bottom-color: rgba(255,255,255,0.06) !important;
}
body.dark-mode .tab-bar {
  background: rgba(0,0,0,0.75) !important;
  border-top-color: rgba(255,255,255,0.06) !important;
}
body.dark-mode .chat-card { border-color: rgba(255,255,255,0.035) !important; }
body.dark-mode .chat-card:hover { background: rgba(255,255,255,0.04) !important; }
body.dark-mode .search-wrap input { background: rgba(0,0,0,0.35) !important; }

/* ============================================================
   RESET
   ============================================================ */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow-x:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--dusk-deep);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ============================================================
   BACKGROUNDS
   ============================================================ */
.bg-base {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 130% 55% at 50% 0%,  #2e1640 0%, transparent 65%),
    radial-gradient(ellipse 70% 45% at 15% 75%,  #1f1028 0%, transparent 55%),
    radial-gradient(ellipse 85% 35% at 85% 55%,  #3a1e45 0%, transparent 50%),
    radial-gradient(ellipse 60% 30% at 50% 95%,  #1a0c1e 0%, transparent 60%),
    linear-gradient(180deg, #1c0e25 0%, #130a18 35%, #0d0610 100%);
}
.bg-glow {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 65% 22% at 50% 28%, rgba(201,123,58,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 45% 18% at 25% 60%, rgba(155,89,182,0.05) 0%, transparent 55%);
}

/* ============================================================
   GLASS
   ============================================================ */
.glass {
  background:
    linear-gradient(180deg,
      rgba(255,255,255,0.11) 0%,
      rgba(255,255,255,0.045) 18%,
      rgba(255,255,255,0.035) 80%,
      rgba(255,255,255,0.06) 100%
    );
  backdrop-filter: blur(32px) saturate(1.3);
  -webkit-backdrop-filter: blur(32px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.13);
  border-top-color: rgba(255,255,255,0.22);
  box-shadow: 0 1px 0 inset rgba(255,255,255,0.12), 0 6px 28px rgba(0,0,0,0.3);
  border-radius: var(--r-lg);
}

/* ============================================================
   STICKY HEADER
   ============================================================ */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 100%);
  backdrop-filter: blur(32px) saturate(1.3);
  -webkit-backdrop-filter: blur(32px) saturate(1.3);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}
.logo { display: flex; align-items: center; gap: 8px; }
.exile-logo-svg { width: 26px; height: 26px; }
.logo-text {
  font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  background: linear-gradient(135deg, #fff 30%, var(--amber-light) 60%, var(--purple-accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header-right { display: flex; align-items: center; gap: 8px; }

/* Theme toggle */
.theme-toggle {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-sec);
  width: 30px; height: 30px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.theme-toggle:hover { background: rgba(255,255,255,0.14); }
.theme-toggle:active { transform: scale(0.95); }
.theme-toggle svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ============================================================
   EXILE ISLAND — floating top-right pill
   ============================================================ */
.exile-island {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(10,5,15,0.82);
  backdrop-filter: blur(28px) saturate(1.5);
  -webkit-backdrop-filter: blur(28px) saturate(1.5);
  border: 1px solid rgba(155,89,182,0.28);
  border-top-color: rgba(255,255,255,0.18);
  border-radius: 20px;
  padding: 5px 11px 5px 7px;
  cursor: pointer;
  transition: padding 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.3s, box-shadow 0.3s;
  box-shadow: 0 2px 20px rgba(155,89,182,0.2), 0 0 0 1px rgba(255,255,255,0.05);
  min-width: 36px;
  overflow: hidden;
  user-select: none;
}
.exile-island:hover {
  background: rgba(20,8,30,0.9);
  box-shadow: 0 4px 28px rgba(155,89,182,0.3), 0 0 0 1px rgba(255,255,255,0.08);
}
.island-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--amber), var(--purple-accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0;
  box-shadow: 0 0 8px rgba(155,89,182,0.4);
}
.island-label {
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.4px;
  color: var(--text-primary);
  white-space: nowrap;
}
.island-unread {
  background: #ef4444;
  color: #fff;
  font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  display: none;
}

/* Island Expanded Panel */
.island-panel {
  position: fixed;
  top: 58px; right: 10px;
  z-index: 199;
  width: 260px;
  background: rgba(12,5,18,0.88);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.12);
  border-top-color: rgba(255,255,255,0.2);
  border-radius: 16px;
  padding: 12px 0 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(155,89,182,0.12);
  transform: scale(0.92) translateY(-8px);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
  transform-origin: top right;
}
.island-panel.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: all;
}
.island-section {
  padding: 4px 12px 2px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--text-dim); text-transform: uppercase;
}
.island-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 8px; margin: 0 4px;
}
.island-item:hover { background: rgba(255,255,255,0.07); }
.island-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
.island-item-label { font-size: 12px; color: var(--text-primary); flex: 1; }
.island-item-sub { font-size: 10px; color: var(--text-dim); }
.island-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 6px 14px; }
.island-notif-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px;
  cursor: pointer;
}
.island-notif-toggle .label { font-size: 12px; color: var(--text-primary); }

/* Toggle switch */
.toggle-sw {
  width: 34px; height: 20px;
  background: rgba(255,255,255,0.12);
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
  cursor: pointer;
  border: none;
}
.toggle-sw.on { background: var(--purple-accent); }
.toggle-sw::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: #fff; border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-sw.on::after { transform: translateX(14px); }

/* ============================================================
   DYNAMIC ISLAND NOTIFICATION BAR — Apple style
   ============================================================ */
.notif-island {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%) scaleX(0.15) scaleY(0.7);
  z-index: 300;
  background: rgba(8,4,14,0.92);
  backdrop-filter: blur(40px) saturate(1.6);
  -webkit-backdrop-filter: blur(40px) saturate(1.6);
  border: 1px solid rgba(255,255,255,0.14);
  border-top-color: rgba(255,255,255,0.22);
  border-radius: 26px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 54px;
  max-width: calc(100vw - 100px);
  box-shadow: 0 4px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(155,89,182,0.15);
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease, border-radius 0.4s ease;
  will-change: transform, opacity;
  overflow: hidden;
  white-space: nowrap;
}
.notif-island.show {
  transform: translateX(-50%) scaleX(1) scaleY(1);
  opacity: 1;
  pointer-events: all;
}
.notif-island.collapsing {
  transform: translateX(-50%) scaleX(0.12) scaleY(0.6);
  opacity: 0;
  pointer-events: none;
}
.notif-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--amber), var(--purple-accent));
  flex-shrink: 0;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.notif-avatar img { width: 100%; height: 100%; object-fit: cover; }
.notif-body { min-width: 0; flex: 1; }
.notif-sender { font-size: 11.5px; font-weight: 600; color: var(--text-primary); truncate: ellipsis; overflow: hidden; text-overflow: ellipsis; }
.notif-preview { font-size: 10.5px; color: var(--text-sec); overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.notif-close {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none; cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 10px;
  transition: background 0.15s;
}
.notif-close:hover { background: rgba(255,255,255,0.18); }

/* ============================================================
   PAGE SHELL
   ============================================================ */
.page {
  position: relative; z-index: 10;
  padding-top: calc(var(--header-h) + 10px);
  padding-bottom: calc(var(--tab-h) + 12px);
  min-height: 100vh;
}

/* ============================================================
   SEARCH BAR
   ============================================================ */
.search-wrap {
  padding: 8px 14px 6px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 9px 36px 9px 36px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-wrap input::placeholder { color: var(--text-dim); }
.search-wrap input:focus {
  border-color: rgba(155,89,182,0.4);
  background: rgba(255,255,255,0.1);
}
.search-icon {
  position: absolute; left: 25px; top: 50%;
  transform: translateY(-50%);
  opacity: 0.4; pointer-events: none;
}
.search-icon svg { width: 15px; height: 15px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; }
.search-clear {
  position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.12); border: none; border-radius: 50%;
  width: 18px; height: 18px; cursor: pointer; display: none;
  align-items: center; justify-content: center; color: var(--text-sec); font-size: 10px;
}
.search-clear.visible { display: flex; }

/* Search results dropdown */
.search-results {
  position: absolute; top: calc(100% + 4px); left: 14px; right: 14px;
  background: rgba(12,5,18,0.92);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-md);
  z-index: 50;
  max-height: 320px; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none;
}
.search-results.open { display: block; }
.search-result-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: rgba(255,255,255,0.07); }
.sr-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--dusk-mid); overflow: hidden; flex-shrink: 0; }
.sr-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sr-info { min-width: 0; }
.sr-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 4px; }
.sr-sub  { font-size: 10.5px; color: var(--text-dim); }
.sr-type { font-size: 9px; color: var(--purple-accent); background: rgba(155,89,182,0.12); padding: 1px 6px; border-radius: 4px; margin-left: auto; flex-shrink: 0; }
.search-empty { padding: 18px 14px; text-align: center; font-size: 12px; color: var(--text-dim); }

/* ============================================================
   CHAT LIST
   ============================================================ */
.section-label {
  padding: 10px 16px 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.7px;
  color: var(--text-dim); text-transform: uppercase;
}

.chat-list { padding: 0 10px; }

.chat-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 8px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
  position: relative;
}
.chat-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.07);
}
.chat-card:active { background: rgba(255,255,255,0.04); }

/* Avatar */
.chat-avatar {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--dusk-mid);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
.chat-avatar.space-av { border-radius: 12px; }
.chat-avatar.feed-av  { border-radius: 8px; }
.avatar-online-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 10px; height: 10px;
  background: #22c55e; border-radius: 50%;
  border: 2px solid var(--dusk-deep);
  display: none;
}
.avatar-online-dot.visible { display: block; }

/* Chat info */
.chat-info { min-width: 0; flex: 1; }
.chat-row1 { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
.chat-name {
  font-size: 13.5px; font-weight: 600; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  min-width: 0; flex: 1;
}
.badge-premium { width: 14px; height: 14px; flex-shrink: 0; }
.badge-verified { width: 14px; height: 14px; flex-shrink: 0; }
.chat-time { font-size: 10px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }
.chat-row2 { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.chat-preview {
  font-size: 12px; color: var(--text-sec);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; min-width: 0;
}
.chat-preview.typing { color: var(--purple-accent); font-style: italic; }
.chat-preview.fromme { color: var(--text-dim); }
.unread-badge {
  background: var(--purple-accent);
  color: #fff;
  font-size: 9px; font-weight: 700;
  min-width: 18px; height: 18px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px; flex-shrink: 0;
}
.unread-badge.muted { background: rgba(255,255,255,0.18); color: var(--text-dim); }

/* Empty state */
.empty-state {
  text-align: center; padding: 48px 24px 24px;
}
.empty-state p { font-size: 13px; color: var(--text-dim); margin-top: 10px; }

/* Load more */
.load-more-trigger { height: 40px; }

/* Skeleton loader */
.skeleton-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 8px; margin-bottom: 2px;
}
.skel { background: rgba(255,255,255,0.07); border-radius: 6px; animation: skelShim 1.4s ease-in-out infinite; }
@keyframes skelShim { 0%,100%{opacity:0.7} 50%{opacity:0.35} }
.skel-av { width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; }
.skel-lines { flex: 1; }
.skel-l1 { height: 12px; width: 55%; margin-bottom: 7px; }
.skel-l2 { height: 10px; width: 80%; }

/* ============================================================
   TAB BAR
   ============================================================ */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--tab-h);
  display: flex; align-items: center;
  padding: 0 4px;
  background: rgba(18,8,18,0.72);
  backdrop-filter: blur(32px) saturate(1.4);
  -webkit-backdrop-filter: blur(32px) saturate(1.4);
  border-top: 1px solid rgba(255,255,255,0.09);
  box-shadow: 0 -2px 24px rgba(0,0,0,0.4);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; padding: 8px 4px;
  border-radius: var(--r-md); transition: background 0.15s;
  text-decoration: none; position: relative;
}
.tab-item:hover { background: rgba(255,255,255,0.06); }
.tab-item svg { width: 20px; height: 20px; fill: none; stroke: var(--text-dim); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
.tab-item span { font-size: 9.5px; color: var(--text-dim); font-weight: 500; transition: color 0.2s; }
.tab-item.active svg { stroke: var(--purple-accent); }
.tab-item.active span { color: var(--purple-accent); font-weight: 700; }
.tab-active-pill {
  position: absolute;
  top: 4px;
  width: 28px; height: 3px;
  background: var(--purple-accent);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--purple-glow);
}
.tab-badge {
  position: absolute; top: 5px; right: calc(50% - 14px);
  background: #ef4444; color: #fff;
  font-size: 8px; font-weight: 700;
  min-width: 14px; height: 14px;
  border-radius: 7px; padding: 0 3px;
  display: flex; align-items: center; justify-content: center;
}

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position: fixed; bottom: calc(var(--tab-h) + 16px); left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(239,68,68,0.9); color: #fff;
  padding: 9px 18px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  transition: transform 0.3s ease;
  z-index: 999; pointer-events: none; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============================================================
   RESPONSIVE
   ============================================================ */

<script>
// ============================================================
//  THEME — runs immediately, no flash
// ============================================================
(function() {
  const stored = localStorage.getItem('theme');
  if (stored === 'dark') document.body.classList.add('dark-mode');
})();

function initThemeToggle() {
  const btn = document.getElementById('theme-toggle');
  const moon = document.getElementById('icon-moon');
  const sun  = document.getElementById('icon-sun');
  function syncIcons() {
    const dark = document.body.classList.contains('dark-mode');
    moon.style.display = dark ? 'none' : '';
    sun.style.display  = dark ? '' : 'none';
  }
  syncIcons();
  btn.addEventListener('click', () => {
    const nowDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', nowDark ? 'dark' : 'default');
    syncIcons();
  });
}

// ============================================================
//  GLOBALS
// ============================================================
let myUserId = null;
let ws = null;
let cpWs = null;
let chatMap = {};            // chatId → chat object (master state)
let page = 1;
let loadingMore = false;
let hasMore = true;
let notificationsEnabled = true;
let notifTimer = null;
let pendingNotif = null;
let typingTimers = {};       // chatId → timeout

const toastEl = document.getElementById('toast');

function showToast(msg, color) {
  toastEl.textContent = msg;
  toastEl.style.background = color || 'rgba(239,68,68,0.9)';
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3200);
}

// ============================================================
//  AUTH CHECK
// ============================================================
async function checkAuth() {
  try {
    const r = await fetch('/api/me', { credentials: 'include' });
    if (!r.ok) { window.location.replace('/login'); return; }
    const { user } = await r.json();
    myUserId = user.userId;
    return user;
  } catch {
    window.location.replace('/login');
  }
}

// ============================================================
//  CHAT LIST LOADING + RENDERING
// ============================================================
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)       return 'now';
  if (diff < 3600)     return Math.floor(diff/60) + 'm';
  if (diff < 86400)    return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  if (diff < 604800)   return d.toLocaleDateString([], {weekday:'short'});
  return d.toLocaleDateString([], {month:'short',day:'numeric'});
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getInitials(name) {
  return (name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}

function buildAvatarEl(chat) {
  const av = document.createElement('div');
  const cls = chat.chatType==='space' ? 'space-av' : chat.chatType==='feed' ? 'feed-av' : '';
  av.className = `chat-avatar ${cls}`;
  if (chat.avatar) {
    const img = document.createElement('img');
    img.src = chat.avatar; img.alt = '';
    img.onerror = () => { av.removeChild(img); av.textContent = getInitials(chat.name); };
    av.appendChild(img);
  } else {
    av.textContent = getInitials(chat.name);
    av.style.background = `hsl(${(chat.chatId||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%360},30%,22%)`;
  }
  if (chat.chatType === 'dm') {
    const dot = document.createElement('div');
    dot.className = 'avatar-online-dot';
    dot.id = `online-${chat.partnerId||chat.chatId}`;
    av.appendChild(dot);
  }
  return av;
}

function buildNameRow(chat) {
  const wrap = document.createElement('div');
  wrap.className = 'chat-name';

  // Premium badge BEFORE name
  if (chat.premium) {
    const img = document.createElement('img');
    img.src = '/premium.png'; img.className = 'badge-premium'; img.alt = 'Premium';
    img.onerror = () => img.style.display='none';
    wrap.appendChild(img);
  }

  const nameSpan = document.createElement('span');
  nameSpan.textContent = chat.name || 'Unknown';
  nameSpan.style.overflow = 'hidden';
  nameSpan.style.textOverflow = 'ellipsis';
  nameSpan.style.whiteSpace = 'nowrap';
  nameSpan.style.minWidth = '0';
  wrap.appendChild(nameSpan);

  // Verified badge AFTER name
  if (chat.verified) {
    const img = document.createElement('img');
    img.src = '/verified.png'; img.className = 'badge-verified'; img.alt = 'Verified';
    img.onerror = () => img.style.display='none';
    wrap.appendChild(img);
  }

  return wrap;
}

function buildChatCard(chat) {
  const card = document.createElement('div');
  card.className = 'chat-card';
  card.dataset.chatId = chat.chatId;

  // Navigate on click
  card.addEventListener('click', () => navigateToChat(chat));

  // Avatar
  card.appendChild(buildAvatarEl(chat));

  // Info column
  const info = document.createElement('div');
  info.className = 'chat-info';

  // Row 1: name + time
  const row1 = document.createElement('div');
  row1.className = 'chat-row1';
  row1.appendChild(buildNameRow(chat));
  const time = document.createElement('div');
  time.className = 'chat-time';
  time.id = `time-${chat.chatId}`;
  time.textContent = formatTime(chat.lastMessage?.sentAt);
  row1.appendChild(time);
  info.appendChild(row1);

  // Row 2: preview + unread badge
  const row2 = document.createElement('div');
  row2.className = 'chat-row2';
  const preview = document.createElement('div');
  preview.className = 'chat-preview';
  preview.id = `preview-${chat.chatId}`;
  const lm = chat.lastMessage;
  if (lm?.preview) {
    if (chat._typing) {
      preview.classList.add('typing');
      preview.textContent = chat._typing;
    } else {
      if (lm.fromMe) preview.classList.add('fromme');
      const prefix = lm.fromMe ? 'You: ' : (chat.chatType !== 'dm' && lm.senderName ? lm.senderName.split(' ')[0]+': ' : '');
      preview.textContent = prefix + lm.preview;
    }
  } else {
    preview.textContent = chat.chatType === 'dm' ? 'Start a conversation' : `${chat.memberCount||0} members`;
    preview.classList.add('fromme');
  }
  row2.appendChild(preview);

  const badge = document.createElement('div');
  badge.className = 'unread-badge';
  badge.id = `badge-${chat.chatId}`;
  if (chat.unreadCount > 0) {
    badge.textContent = chat.unreadCount > 99 ? '99+' : chat.unreadCount;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
  row2.appendChild(badge);
  info.appendChild(row2);
  card.appendChild(info);

  return card;
}

function navigateToChat(chat) {
  if (chat.chatType === 'dm')    window.location.href = `/chat/${chat.partnerId}`;
  else if (chat.chatType === 'space') window.location.href = `/space/${chat.chatId}`;
  else if (chat.chatType === 'feed')  window.location.href = `/feed/${chat.chatId}`;
}

function renderChatList() {
  const listEl = document.getElementById('chat-list');
  const emptyEl = document.getElementById('empty-state');
  const items = Object.values(chatMap).sort((a,b) => new Date(b._sortKey) - new Date(a._sortKey));
  listEl.innerHTML = '';
  if (items.length === 0) {
    listEl.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }
  listEl.style.display = 'block';
  emptyEl.style.display = 'none';
  items.forEach(c => listEl.appendChild(buildChatCard(c)));
}

function upsertChat(chat) {
  const sortKey = chat.lastMessage?.sentAt || chat._sortKey || '1970-01-01T00:00:00.000Z';
  chatMap[chat.chatId] = { ...chatMap[chat.chatId], ...chat, _sortKey: sortKey };
}

async function loadChats(p = 1) {
  try {
    const r = await fetch(`/api/chat-list?page=${p}`, { credentials: 'include' });
    if (!r.ok) throw new Error('Failed');
    const { chats, hasMore: more } = await r.json();
    hasMore = more;
    if (p === 1) {
      chatMap = {};
      document.getElementById('skeleton-list').style.display = 'none';
      document.getElementById('chat-list').style.display = 'block';
    }
    chats.forEach(upsertChat);
    renderChatList();
    return true;
  } catch(e) {
    document.getElementById('skeleton-list').style.display = 'none';
    showToast('Could not load chats', 'rgba(245,158,11,0.9)');
    return false;
  }
}

// ============================================================
//  INFINITE SCROLL
// ============================================================
function initInfiniteScroll() {
  const trigger = document.getElementById('load-more');
  const obs = new IntersectionObserver(async (entries) => {
    if (entries[0].isIntersecting && !loadingMore && hasMore) {
      loadingMore = true;
      page++;
      await loadChats(page);
      loadingMore = false;
    }
  }, { threshold: 0.1 });
  obs.observe(trigger);
}

// ============================================================
//  WEBSOCKET — chat + typing + presence
// ============================================================
function initWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/`);

  ws.onopen = () => {
    // heartbeat
    setInterval(() => { if (ws.readyState === 1) ws.send(JSON.stringify({type:'ping'})); }, 25000);
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleWsMessage(msg);
  };

  ws.onclose = () => setTimeout(initWS, 3000);
  ws.onerror = () => ws.close();
}

function handleWsMessage(msg) {
  switch (msg.type) {

    // ── New DM / group message ──
    case 'newMessage':
    case 'newGroupMessage': {
      const chatId  = msg.message?.conversationId || msg.message?.groupId || msg.groupId || msg.chat?.chatId;
      const chatType = msg.chat?.chatType || (msg.message?.conversationId ? 'dm' : 'space');
      if (!chatId) return;
      const lm = {
        preview:    msg.message?.type === 'text'
          ? (msg.message.content?.text||'').slice(0,80)
          : `[${msg.message?.type||'message'}]`,
        type:       msg.message?.type,
        sentAt:     msg.message?.sentAt,
        senderName: msg.from?.name || msg.message?.senderName,
        fromMe:     msg.from?.userId === myUserId || msg.message?.senderId === myUserId,
      };
      const existing = chatMap[chatId];
      if (existing) {
        existing.lastMessage = lm;
        existing._sortKey    = lm.sentAt;
        if (!msg.fromMe) existing.unreadCount = (existing.unreadCount||0) + 1;
        clearTyping(chatId);
        renderChatList();
        updateUnreadBadge();
      } else {
        // chat not in list — reload page 1 to pick it up
        loadChats(1);
      }

      // Dynamic Island notification if not fromMe and notif enabled
      if (!msg.fromMe && notificationsEnabled) {
        const sender = msg.from || {};
        showNotification({
          name:    sender.name || msg.message?.senderName || 'Someone',
          avatar:  sender.profilePicture || msg.message?.senderAvatar || null,
          preview: lm.preview,
          chatId,
          chatType,
          partnerId: sender.userId,
          chat:    existing,
        });
      }
      break;
    }

    // ── chatListUpdate — reorder without full reload ──
    case 'chatListUpdate': {
      const { chatId, chatType, lastMessage, fromMe } = msg;
      if (!chatId) return;
      const existing = chatMap[chatId];
      if (existing) {
        existing.lastMessage = { ...lastMessage, fromMe };
        existing._sortKey = lastMessage?.sentAt || existing._sortKey;
        clearTyping(chatId);
        renderChatList();
        updateUnreadBadge();
      }
      break;
    }

    // ── Typing indicator (DM) ──
    case 'typing': {
      const cid = msg.conversationId;
      if (!cid || msg.userId === myUserId) return;
      if (msg.isTyping) {
        setTypingIndicator(cid, `${getShortName(msg.userId)} is typing…`);
      } else {
        clearTyping(cid);
      }
      break;
    }

    // ── Group typing ──
    case 'groupTyping': {
      const gid = msg.groupId;
      if (!gid) return;
      const others = (msg.typers||[]).filter(t => t.userId !== myUserId);
      if (others.length > 0) {
        const names = others.slice(0,2).map(t => t.name.split(' ')[0]);
        const label = others.length === 1
          ? `${names[0]} is typing…`
          : others.length === 2
          ? `${names[0]} and ${names[1]} are typing…`
          : `${names[0]}, ${names[1]} and ${others.length-2} others are typing…`;
        setTypingIndicator(gid, label);
      } else {
        clearTyping(gid);
      }
      break;
    }

    // ── Presence ──
    case 'presence': {
      const dot = document.getElementById(`online-${msg.userId}`);
      if (dot) {
        dot.classList.toggle('visible', msg.status === 'online');
      }
      break;
    }

    // ── Messages read — clear unread badge ──
    case 'messagesRead':
    case 'groupMessagesRead': {
      const cid = msg.conversationId || msg.groupId;
      if (chatMap[cid] && msg.readerId === myUserId) {
        chatMap[cid].unreadCount = 0;
        updateChatBadge(cid, 0);
        updateUnreadBadge();
      }
      break;
    }

    case 'pong': break;
  }
}

function getShortName(userId) {
  const chat = Object.values(chatMap).find(c => c.partnerId === userId);
  return chat ? chat.name.split(' ')[0] : 'Someone';
}

function setTypingIndicator(chatId, label) {
  if (chatMap[chatId]) chatMap[chatId]._typing = label;
  const el = document.getElementById(`preview-${chatId}`);
  if (el) {
    el.className = 'chat-preview typing';
    el.textContent = label;
  }
  clearTimeout(typingTimers[chatId]);
  typingTimers[chatId] = setTimeout(() => clearTyping(chatId), 6000);
}

function clearTyping(chatId) {
  if (chatMap[chatId]) chatMap[chatId]._typing = null;
  const el = document.getElementById(`preview-${chatId}`);
  if (el) {
    const chat = chatMap[chatId];
    if (!chat) return;
    const lm = chat.lastMessage;
    el.classList.remove('typing');
    if (lm?.fromMe) el.classList.add('fromme'); else el.classList.remove('fromme');
    const prefix = lm?.fromMe ? 'You: ' : (chat.chatType !== 'dm' && lm?.senderName ? lm.senderName.split(' ')[0]+': ' : '');
    el.textContent = lm?.preview ? prefix + lm.preview : '';
  }
}

function updateChatBadge(chatId, count) {
  const badge = document.getElementById(`badge-${chatId}`);
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count > 99 ? '99+' : count;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function updateUnreadBadge() {
  const total = Object.values(chatMap).reduce((s,c) => s + (c.unreadCount||0), 0);
  const tabBadge = document.getElementById('tab-unread');
  if (total > 0) {
    tabBadge.textContent = total > 99 ? '99+' : total;
    tabBadge.style.display = 'flex';
  } else {
    tabBadge.style.display = 'none';
  }
  // Island unread badge
  const ib = document.getElementById('island-unread');
  if (total > 0) {
    ib.textContent = total > 99 ? '99+' : total;
    ib.style.display = 'flex';
  } else {
    ib.style.display = 'none';
  }
}

// ============================================================
//  CONTROL PANEL WEBSOCKET
// ============================================================
function initCPWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  cpWs = new WebSocket(`${proto}//${location.host}/controlpanel`);

  cpWs.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === 'init') {
      document.getElementById('cp-name').textContent = msg.name || 'Unknown';
      document.getElementById('cp-exiles').textContent = `${msg.exiles||0} ⚔`;
      document.getElementById('cp-level').textContent = msg.levelInfo?.level || '—';
      document.getElementById('cp-xp-text').textContent = `${msg.xp||0} XP`;
    }
    if (msg.type === 'notification') {
      if (!notificationsEnabled) return;
      showNotification({
        name:    msg.sender?.name || 'Someone',
        avatar:  msg.sender?.profilePicture || null,
        preview: msg.preview,
        chatId:  msg.conversationId,
        chatType: 'dm',
        partnerId: msg.sender?.userId,
      });
    }
    if (msg.type === 'xpUpdate') {
      document.getElementById('cp-level').textContent = msg.level || '—';
      document.getElementById('cp-xp-text').textContent = `${msg.xp||0} XP`;
    }
    if (msg.type === 'exilesUpdate') {
      document.getElementById('cp-exiles').textContent = `${msg.exiles||0} ⚔`;
    }
    if (msg.type === 'ping') cpWs.send(JSON.stringify({type:'pong'}));
  };

  cpWs.onclose = () => setTimeout(initCPWS, 3500);
  cpWs.onerror = () => cpWs.close();
}

// ============================================================
//  DYNAMIC ISLAND NOTIFICATION
// ============================================================
function showNotification({ name, avatar, preview, chatId, chatType, partnerId, chat }) {
  if (!notificationsEnabled) return;
  const island = document.getElementById('notif-island');

  // Populate content
  const avEl = document.getElementById('ni-avatar');
  avEl.innerHTML = '';
  if (avatar) {
    const img = document.createElement('img');
    img.src = avatar; img.alt = '';
    img.onerror = () => { avEl.innerHTML = '💬'; };
    avEl.appendChild(img);
  } else {
    avEl.textContent = (name||'?')[0].toUpperCase();
  }
  document.getElementById('ni-sender').textContent = name;
  document.getElementById('ni-preview').textContent = preview;

  // Store pending nav
  pendingNotif = { chatId, chatType, partnerId, chat };
  island.onclick = () => {
    collapseNotif();
    if (pendingNotif) navigateToChat({ chatId: pendingNotif.chatId, chatType: pendingNotif.chatType, partnerId: pendingNotif.partnerId });
  };

  // Clear previous timer
  if (notifTimer) clearTimeout(notifTimer);
  island.classList.remove('collapsing');
  island.classList.add('show');

  // Auto-collapse after 4.5s
  notifTimer = setTimeout(() => collapseNotif(), 4500);
}

function collapseNotif() {
  const island = document.getElementById('notif-island');
  island.classList.remove('show');
  island.classList.add('collapsing');
  setTimeout(() => island.classList.remove('collapsing'), 500);
  if (notifTimer) { clearTimeout(notifTimer); notifTimer = null; }
}

// ============================================================
//  EXILE ISLAND PANEL
// ============================================================
function initIslandToggle() {
  const btn = document.getElementById('exile-island');
  const panel = document.getElementById('island-panel');

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    panel.classList.toggle('open');
  });

  document.addEventListener('click', (e) => {
    if (!panel.contains(e.target) && !btn.contains(e.target)) {
      panel.classList.remove('open');
    }
  });

  // Logout
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.replace('/login');
  });
}

function toggleNotifications(btn) {
  notificationsEnabled = !notificationsEnabled;
  btn.classList.toggle('on', notificationsEnabled);
  localStorage.setItem('notificationsEnabled', notificationsEnabled ? '1' : '0');
  showToast(notificationsEnabled ? 'Notifications on' : 'Notifications off', 'rgba(155,89,182,0.9)');
}

// ============================================================
//  SEARCH
// ============================================================
let searchTimer = null;

function initSearch() {
  const input   = document.getElementById('search-input');
  const clearBtn = document.getElementById('search-clear');
  const results = document.getElementById('search-results');

  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    clearTimeout(searchTimer);
    if (q.length < 1) { results.classList.remove('open'); return; }
    searchTimer = setTimeout(() => doSearch(q), 300);
  });

  input.addEventListener('focus', () => {
    if (input.value.trim().length > 1) results.classList.add('open');
  });

  document.addEventListener('click', (e) => {
    if (!document.getElementById('search-wrap').contains(e.target)) {
      results.classList.remove('open');
    }
  });
}

async function doSearch(q) {
  const results = document.getElementById('search-results');
  results.innerHTML = '<div class="search-empty">Searching…</div>';
  results.classList.add('open');

  try {
    // Parallel: search users + global messages
    const [usersRes, msgsRes] = await Promise.all([
      fetch(`/api/search/users?q=${encodeURIComponent(q)}&limit=8`, { credentials: 'include' }).then(r => r.json()),
      fetch(`/api/search/messages?q=${encodeURIComponent(q)}&limit=5`, { credentials: 'include' }).then(r => r.json()),
    ]);

    const users = usersRes.users || [];
    const msgs  = msgsRes.results || [];

    results.innerHTML = '';

    if (users.length === 0 && msgs.length === 0) {
      results.innerHTML = '<div class="search-empty">No results found</div>';
      return;
    }

    if (users.length > 0) {
      const hdr = document.createElement('div');
      hdr.style.cssText = 'padding:6px 14px 2px;font-size:9px;font-weight:700;letter-spacing:0.7px;color:var(--text-dim);text-transform:uppercase;';
      hdr.textContent = 'People';
      results.appendChild(hdr);

      users.forEach(u => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `
          <div class="sr-avatar">${u.profilePicture ? `<img src="${escHtml(u.profilePicture)}" alt="">` : escHtml(getInitials(u.name))}</div>
          <div class="sr-info">
            <div class="sr-name">
              ${u.premium ? '<img src="/premium.png" width="12" height="12" onerror="this.style.display=\'none\'">' : ''}
              ${escHtml(u.name)}
              ${u.verified ? '<img src="/verified.png" width="12" height="12" onerror="this.style.display=\'none\'">' : ''}
            </div>
            <div class="sr-sub">@${escHtml(u.username||'')} · ${escHtml(u.contactNumber||'')}</div>
          </div>
          <div class="sr-type">user</div>
        `;
        item.addEventListener('click', () => { window.location.href = `/chat/${u.userId}`; });
        results.appendChild(item);
      });
    }

    if (msgs.length > 0) {
      const hdr = document.createElement('div');
      hdr.style.cssText = 'padding:6px 14px 2px;font-size:9px;font-weight:700;letter-spacing:0.7px;color:var(--text-dim);text-transform:uppercase;';
      hdr.textContent = 'Messages';
      results.appendChild(hdr);

      msgs.forEach(m => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        const who = m.counterpart?.name || m.senderName || 'Unknown';
        item.innerHTML = `
          <div class="sr-avatar" style="border-radius:8px;font-size:12px;display:flex;align-items:center;justify-content:center;">${escHtml(getInitials(who))}</div>
          <div class="sr-info">
            <div class="sr-name">${escHtml(who)}</div>
            <div class="sr-sub">${escHtml(m.preview)}</div>
          </div>
          <div class="sr-type">${escHtml(m.chatType||'dm')}</div>
        `;
        item.addEventListener('click', () => {
          const chat = { chatId: m.chatId, chatType: m.chatType, partnerId: m.counterpart?.userId };
          navigateToChat(chat);
        });
        results.appendChild(item);
      });
    }

  } catch(e) {
    results.innerHTML = '<div class="search-empty">Search failed</div>';
  }
}

function clearSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const clearBtn = document.getElementById('search-clear');
  input.value = '';
  results.classList.remove('open');
  clearBtn.classList.remove('visible');
  input.focus();
}

// ============================================================
//  INIT
// ============================================================
async function init() {
  initThemeToggle();

  // Restore notif setting
  const storedNotif = localStorage.getItem('notificationsEnabled');
  if (storedNotif === '0') {
    notificationsEnabled = false;
    document.getElementById('notif-toggle-btn').classList.remove('on');
  }

  const user = await checkAuth();
  if (!user) return;

  // Load initial chat list
  await loadChats(1);
  updateUnreadBadge();

  // Init everything
  initIslandToggle();
  initSearch();
  initInfiniteScroll();
  initWS();
  initCPWS();
}

document.addEventListener('DOMContentLoaded', init);
</script>
